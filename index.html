<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="핵박사 군인의 핵심 주식투자 - 군인을 위한 장기 ETF 투자 에세이와 데이터 그래프">
  <title>핵박사 군인의 핵심 주식투자</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #f7efe8;
      --text: #18202b;
      --muted: #5f6976;
      --line: #dce3ea;
      --accent: #BF5700;
      --accent-strong: #8f3f00;
      --accent-soft: #fff1e6;
      --gold: #9d6b1f;
      --danger: #a33b2f;
      --shadow: 0 18px 50px rgba(24, 32, 43, 0.12);
      --radius: 8px;
      --content: 820px;
      --article-scale: 1;
      --hero-image: url("plots/5.3.2_virtual_qqq_qld_tqqq.png");
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: #101418;
      --surface: #171d23;
      --surface-soft: #2a211b;
      --text: #eef2f4;
      --muted: #a8b3bd;
      --line: #303a44;
      --accent: #ff8f45;
      --accent-strong: #ffb27f;
      --accent-soft: #3a2416;
      --gold: #d39a4b;
      --danger: #e18a7b;
      --danger: #e18a7b;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", system-ui, sans-serif;
      line-height: 1.78;
      text-rendering: optimizeLegibility;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      transform: translateY(-160%);
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      transition: transform 160ms ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .progress {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 90;
      height: 4px;
      background: transparent;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      transition: width 80ms linear;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 80;
      border-bottom: 1px solid rgba(220, 227, 234, 0.82);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      backdrop-filter: blur(16px);
    }

    [data-theme="dark"] .topbar {
      border-bottom-color: rgba(48, 58, 68, 0.82);
    }

    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--accent);
      font-size: 14px;
      flex: 0 0 auto;
    }

    .brand span:last-child {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .icon-button:hover:not(:disabled) {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .icon-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .icon-button svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toc-toggle {
      display: none;
    }

    .segmented,
    .text-size-controls {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .segmented button {
      min-width: 42px;
      min-height: 32px;
      border: 0;
      border-radius: 6px;
      padding: 6px 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 850;
      line-height: 1;
      letter-spacing: 0;
      transition: background 160ms ease, color 160ms ease;
    }

    .segmented button:hover,
    .segmented button[aria-pressed="true"] {
      background: var(--accent);
      color: #fff;
    }

    .text-size-controls .icon-button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 6px;
      font-size: 1.05rem;
      font-weight: 900;
    }

    .hero {
      position: relative;
      min-height: min(640px, 68vh);
      display: grid;
      align-items: end;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(246, 248, 251, 0.97) 0%, rgba(246, 248, 251, 0.82) 44%, rgba(246, 248, 251, 0.36) 100%),
        var(--hero-image) center right / cover no-repeat;
      border-bottom: 1px solid var(--line);
    }

    [data-theme="dark"] .hero {
      background:
        linear-gradient(90deg, rgba(16, 20, 24, 0.97) 0%, rgba(16, 20, 24, 0.86) 48%, rgba(16, 20, 24, 0.5) 100%),
        var(--hero-image) center right / cover no-repeat;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 160px;
      background: linear-gradient(180deg, transparent, var(--bg));
      z-index: -1;
    }

    .hero-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 92px 0 70px;
    }

    .kicker {
      margin: 0 0 14px;
      color: var(--accent-strong);
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(2.4rem, 6vw, 5.9rem);
      line-height: 1.02;
      letter-spacing: 0;
      font-weight: 900;
    }

    .hero-lead {
      max-width: 720px;
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(1.03rem, 2.2vw, 1.28rem);
      line-height: 1.7;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      gap: 34px;
      padding: 34px 0 76px;
      align-items: start;
    }

    .toc-panel {
      position: sticky;
      top: 78px;
      max-height: calc(100vh - 100px);
      overflow: auto;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 28px rgba(24, 32, 43, 0.06);
    }

    .toc-title {
      margin: 0 0 12px;
      font-size: 0.9rem;
      font-weight: 900;
      color: var(--accent-strong);
    }

    .toc-list {
      display: grid;
      gap: 4px;
    }

    .toc-list a {
      display: block;
      padding: 7px 8px;
      border-radius: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1.35;
      transition: background 160ms ease, color 160ms ease;
    }

    .toc-list a.level-1 {
      margin-top: 8px;
      color: var(--text);
      font-weight: 850;
    }

    .toc-list a.level-2 {
      padding-left: 18px;
      font-size: 0.86rem;
    }

    .toc-list a.active,
    .toc-list a:hover {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .toc-backdrop {
      display: none;
    }

    .content {
      display: grid;
      gap: 26px;
      min-width: 0;
    }

    .article-shell {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .article-shell {
      overflow: hidden;
    }

    .article {
      max-width: var(--content);
      margin: 0 auto;
      padding: clamp(26px, 5vw, 58px) clamp(18px, 4vw, 48px) 70px;
      font-family: "Noto Serif KR", "Nanum Myeongjo", "Apple SD Gothic Neo", "Malgun Gothic", serif;
      font-size: calc(clamp(1rem, 1.45vw, 1.08rem) * var(--article-scale));
    }

    [data-language="en"] .article {
      font-family: Georgia, "Times New Roman", "Noto Serif", serif;
      word-break: normal;
    }

    .article.loading {
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .article h1,
    .article h2,
    .article h3,
    .article h4 {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", system-ui, sans-serif;
      letter-spacing: 0;
      line-height: 1.25;
      scroll-margin-top: 86px;
    }

    .article h1 {
      margin: 3.4em 0 1.1em;
      padding-top: 0.9em;
      border-top: 1px solid var(--line);
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 900;
    }

    .article h2 {
      margin: 2.5em 0 0.9em;
      font-size: clamp(1.32rem, 2.6vw, 1.9rem);
      font-weight: 880;
    }

    .article h3 {
      margin: 2em 0 0.8em;
      font-size: 1.15rem;
      font-weight: 850;
      color: var(--accent-strong);
    }

    .article h1:first-child,
    .article h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .article p {
      margin: 1.05em 0;
    }

    .article ul {
      margin: 1em 0 1.35em;
      padding-left: 1.3em;
    }

    .article li {
      margin: 0.65em 0;
      padding-left: 0.2em;
    }

    .article .list-detail {
      margin: 0.28em 0 0.6em;
      color: var(--muted);
      font-size: 0.96em;
    }

    .article code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.92em;
      border: 1px solid var(--line);
      background: var(--bg);
      border-radius: 5px;
      padding: 0.08em 0.32em;
    }

    .book-figure {
      width: 100%;
      max-width: 100%;
      margin: 2.1em 0;
      padding: clamp(12px, 2vw, 18px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }

    .book-figure img {
      width: 100%;
      height: auto;
      max-height: 72vh;
      object-fit: contain;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .book-figure figcaption {
      margin-top: 12px;
      color: var(--muted);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      font-size: 0.92rem;
      line-height: 1.55;
      text-align: center;
    }

    .error-box {
      width: min(620px, 100%);
      border: 1px solid color-mix(in srgb, var(--danger) 42%, var(--line));
      border-left: 4px solid var(--danger);
      border-radius: var(--radius);
      padding: 18px;
      background: var(--surface);
      color: var(--text);
    }

    .error-box h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .error-box p {
      margin: 0;
      color: var(--muted);
    }

    .back-to-top {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 70;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .back-to-top.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .toc-toggle {
        display: grid;
      }

      .toc-panel {
        position: fixed;
        top: 70px;
        left: 11px;
        bottom: 14px;
        z-index: 82;
        width: min(360px, calc(100% - 22px));
        max-width: calc(100% - 22px);
        max-height: none;
        transform: translateX(calc(-100% - 18px));
        transition: transform 180ms ease;
      }

      body.toc-open {
        overflow: hidden;
      }

      body.toc-open .toc-panel {
        transform: translateX(0);
      }

      .toc-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        z-index: 75;
        background: rgba(8, 12, 16, 0.46);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      body.toc-open .toc-backdrop {
        opacity: 1;
        pointer-events: auto;
      }
    }

    @media (max-width: 680px) {
      body {
        word-break: normal;
      }

      .topbar-inner,
      .hero-inner,
      .page {
        width: min(100% - 22px, 1180px);
      }

      .topbar-inner {
        gap: 8px;
        min-height: 56px;
      }

      .top-actions {
        gap: 5px;
      }

      .icon-button {
        width: 36px;
        height: 36px;
      }

      .segmented,
      .text-size-controls {
        padding: 2px;
      }

      .segmented button {
        min-width: 34px;
        min-height: 32px;
        padding: 6px 8px;
      }

      .text-size-controls .icon-button {
        width: 31px;
        height: 31px;
      }

      .hero {
        min-height: 590px;
        background-position: center bottom;
      }

      .hero-inner {
        padding: 82px 0 54px;
      }

      .hero h1 {
        font-size: clamp(2.35rem, 13vw, 4rem);
      }

      .toc-list {
        grid-template-columns: 1fr;
      }

      .article {
        padding-inline: 17px;
      }

      .brand span:last-child {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" id="skipLink" href="#book">본문으로 이동</a>
  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" id="brandLink" href="#top" aria-label="처음으로 이동">
        <span class="brand-mark">核</span>
        <span id="brandText">핵박사 군인의 핵심 주식투자</span>
      </a>
      <div class="top-actions">
        <button class="icon-button toc-toggle" id="tocToggle" type="button" aria-controls="tocPanel" aria-expanded="false" aria-label="목차 열기">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16"></path><path d="M4 12h16"></path><path d="M4 18h16"></path></svg>
        </button>
        <div class="segmented language-control" id="languageControl" aria-label="언어 선택">
          <button type="button" data-language-choice="ko" aria-pressed="true">KR</button>
          <button type="button" data-language-choice="en" aria-pressed="false">EN</button>
        </div>
        <div class="segmented theme-control" id="themeControl" aria-label="테마 선택">
          <button type="button" data-theme-choice="light" aria-pressed="true">White</button>
          <button type="button" data-theme-choice="dark" aria-pressed="false">Dark</button>
        </div>
        <div class="text-size-controls" id="textSizeControl" aria-label="글씨 크기 조절">
          <button class="icon-button" id="textDecrease" type="button" aria-label="글씨 작게">-</button>
          <button class="icon-button" id="textIncrease" type="button" aria-label="글씨 크게">+</button>
        </div>
      </div>
    </div>
  </header>
  <div class="toc-backdrop" id="tocBackdrop" aria-hidden="true"></div>

  <section class="hero" id="top">
    <div class="hero-inner">
      <p class="kicker" id="heroKicker">군인을 위한 장기 ETF 투자 노트</p>
      <h1 id="heroTitle">핵박사 군인의 핵심 주식투자</h1>
      <p class="hero-lead" id="heroLead">
        금융 문맹에서 시작해 시장 전체를 사고 오래 보유하는 투자 원칙까지.
        책의 본문과 데이터 그래프를 한 화면에서 읽기 좋게 정리했습니다.
      </p>
    </div>
  </section>

  <main class="page">
    <aside class="toc-panel" id="tocPanel" aria-label="목차">
      <p class="toc-title" id="tocTitle">목차</p>
      <nav class="toc-list" id="toc"></nav>
    </aside>

    <div class="content">
      <section class="article-shell">
        <article class="article loading" id="book" aria-live="polite">본문을 불러오는 중입니다.</article>
      </section>
    </div>
  </main>

  <button class="icon-button back-to-top" id="backToTop" type="button" aria-label="맨 위로 이동">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 15-6-6-6 6"></path></svg>
  </button>

  <template id="bookTemplate">
<h2 id="들어가며">들어가며</h2>
<p>안녕하세요. 이렇게 지면으로나마 여러분과 만날 수 있어서 제가 얼마나 행복한지 모르실 겁니다. 저는 책이 작자 혼자 완성하는 것이 아니라고 생각해요. 글을 쓰는 사람은 문장을 만들지만, 그 문장에 의미를 부여하고 끝까지 완성해주는 사람은 결국 독자라고 믿습니다. 그런 의미에서 이 책을 펼쳐주신 여러분께 진심으로 감사드립니다.</p>
<p>먼저 제가 왜 이 책을 쓰게 되었는지 말씀드리고 싶어요. 저는 2011년에 장교로 임관했습니다. 그때부터 월급을 받기 시작했으니, 어느덧 사회생활을 시작한 지 15년이 지났네요. 돌이켜보면 저는 오랫동안 돈을 벌 줄은 알았지만, 돈을 어떻게 지키고 불려야 하는지는 잘 몰랐습니다. 월급을 받으면 저축을 하고, 남들이 좋다고 하는 상품에 가입하고, 누군가 전문가처럼 말하면 그 말을 믿었습니다. 그 정도면 제가 할 수 있는 최선을 다하고 있다고 생각했어요.</p>
<p>하지만 결과는 기대와 달랐습니다. 주변 사람들의 말과 소위 투자 전문가라는 사람들의 말을 믿고 선택했던 펀드는 10년 동안 은행 이자만도 못한 수익을 냈습니다. 사업비가 무엇인지도 모르고 가입했던 변액보험은 오히려 손실을 냈습니다. 심지어 3천만 원 사기를 당해 겨우 모았던 종잣돈마저 날려버린 적도 있습니다. 지금 생각하면 부끄럽고 아픈 기억입니다. 하지만 동시에 그 경험들이 제게 금융 지식이 얼마나 중요한지 뼈저리게 알려주었습니다.</p>
<p>그러던 제가 2021년에 처음으로 선배의 추천이자 제 의지로 경제 서적을 읽기 시작했습니다. 그때부터 많은 것이 바뀌었습니다. 돈을 바라보는 관점이 바뀌었고, 투자를 대하는 태도가 바뀌었고, 무엇보다 제게 맞는 투자 방법을 찾을 수 있었습니다. 그리고 확신을 가지고 꾸준히 투자한 결과, 제 자산도 빠르게 늘어나기 시작했습니다.</p>
<p>그렇다고 제가 돈을 좀 벌었다고 자랑하기 위해 이 책을 쓰는 것은 결코 아닙니다. 오히려 그 반대에 가깝습니다. 저는 이 책에서 제 부족했던 과거를 숨기고 싶지 않았습니다. 제가 얼마나 몰랐는지, 얼마나 쉽게 휘둘렸는지, 얼마나 어리석은 선택을 했는지 솔직하게 이야기하고 싶었습니다. 그 이유는 단 하나입니다. 여러분만큼은 제가 밟았던 시행착오를 똑같이 겪지 않으셨으면 하기 때문입니다.</p>
<p>여러분이 제가 말하는 투자법을 따라 한다고 해서 제게 무슨 이득이 있겠습니까. 제가 진심으로 바라는 것은 여러분이 바쁜 일상 속에서도 최소한의 노력으로 합리적인 투자 방법을 이해하고, 자신과 가족의 자산을 지킬 수 있게 되는 것입니다. 금융 지식이 부족하면 너무 쉽게 누군가의 먹잇감이 됩니다. 그 사람들은 친절한 얼굴로 다가오고, 어려운 용어를 쓰며, 마치 여러분만을 위한 좋은 기회인 것처럼 말합니다. 하지만 스스로 이해하고 투자하지 않는다면 결국 손해를 보는 쪽은 늘 우리입니다.</p>
<p>특히 군인들은 세상 물정에 어두운 경우가 많습니다. 저 역시 그랬습니다. 조직 안에서 주어진 임무에 충실하게 살다 보면, 바깥세상의 돈의 흐름이나 금융 상품의 구조를 깊이 들여다볼 기회가 많지 않습니다. 월급은 정해진 날 들어오고, 생활은 비교적 규칙적이며, 금융과 투자는 어딘가 나와 먼 이야기처럼 느껴지기도 합니다. 하지만 바로 그렇기 때문에 더 조심해야 합니다. 세상은 우리가 모른다고 해서 봐주지 않습니다. 오히려 모르는 사람을 더 쉽게 이용합니다.</p>
<p>세상에는 복잡하고 다양한 투자법이 많습니다. 하루에도 수많은 뉴스가 나오고, 수많은 전문가가 각자의 의견을 말합니다. 어떤 사람은 단타를 말하고, 어떤 사람은 부동산을 말하고, 어떤 사람은 코인이나 개별 주식을 말합니다. 물론 그중에는 좋은 방법도 있을 것입니다. 하지만 저는 이 책에서 핵심만 이해하고 아주 단순한 투자를 통해 충분한 수익을 얻을 수 있다는 이야기를 전하고 싶었습니다. 본업이 있는데 하루 종일 휴대폰의 주식창만 보거나 부동산 가격을 계속 검색하는 생활은 장기적으로 마이너스라고 생각합니다.</p>
<p>저나 여러분이 전문 펀드매니저처럼 모든 회사의 재무제표를 분석하고, 산업의 변화를 예측하고, 복잡한 투자 전략을 실천할 수 있다면 좋겠지요. 하지만 대부분의 본업을 가진 사람은 그렇게 살 수 없습니다. 우리는 각자의 일이 있고, 가정이 있고, 해야 할 책임이 있습니다. 그렇다고 투자를 포기해야 하는 것은 아닙니다. 우리가 가진 시간과 에너지 안에서도 충분히 실천할 수 있는 방법이 있습니다. 복잡하지 않지만 강력하고, 매일 들여다보지 않아도 장기적으로 자산을 키워갈 수 있는 방법이 있습니다. 저는 이 책에서 바로 그 이야기를 할 것입니다.</p>
<p>여러분 중 몇몇은 이런 생각을 하실지도 모르겠습니다. &quot;전문 투자자나 펀드매니저도 아니고 은행에서 일한 적도 없는 군인이 무슨 투자에 대한 책을 쓰나&quot; 하는 의문을 가지신 분들도 적지 않을 거라 생각합니다. 적어도 투자서를 쓰려면 투자 기관에서 오랫동안 일한 경력이 있거나, 이미 큰 부를 이루어 스스로를 증명한 사람이어야 한다고 생각하실 수도 있습니다. 그 마음을 충분히 이해합니다.</p>
<p>하지만 저는 조금 다른 관점에서 말씀드리고 싶습니다. 먼저 투자 기관에서 일했다거나 전문 투자자라고 해서 반드시 좋은 수익률을 내는 것은 아닙니다. 실제로 많은 펀드매니저가 장기적으로 S&amp;P500과 같은 시장 지수를 이기지 못합니다. 높은 지식과 화려한 경력이 반드시 높은 수익률로 이어지는 것은 아닙니다. 투자에서 중요한 것은 더 많은 것을 아는 것만이 아니라, 오히려 중요한 것을 단순하게 붙잡고 오래 실천하는 힘일지도 모릅니다.</p>
<p>또 하나 말씀드리고 싶은 것은, 이미 크게 성공한 사람들의 이야기와 지금 우리의 현실 사이에는 간격이 있다는 점입니다. 성공한 사람들의 이야기는 늘 매력적입니다. 허름한 차고에서 시작해 세계적인 기업이 된 애플이나 휴렛팩커드의 이야기, 낯선 나라에서 수많은 어려움을 견디며 사업을 일구어낸 스노우 폭스의 김승호 회장 이야기처럼 말이지요. 그런 이야기는 우리에게 용기와 영감을 줍니다. 하지만 그들이 부를 쌓아온 시대와 지금 우리가 살아가는 시대는 다르기에 그들이 사용했던 방법이 지금도 똑같이 통한다고 보장할 수는 없습니다. 이미 너무 많은 사람이 그 방법을 따라 하고 있을 수도 있고, 당시에는 기회였던 것이 지금은 경쟁이 치열한 시장이 되었을 수도 있습니다. 성공담은 배울 점이 많지만, 그대로 복사할 수 있는 정답지는 아닙니다.</p>
<p>그래서 저는 지금 자산을 형성해가고 있는 한 사람의 이야기도 누군가에게는 필요할 수 있다고 생각했습니다. 저는 완성된 전설이 아닙니다. 거대한 부를 이룬 사람도 아니고, 월가에서 수십 년을 일한 전문가도 아닙니다. 오히려 여러분과 더 가까운 위치에 있는 사람일지도 모릅니다. 월급을 받으며 살았고, 돈을 몰라 손해를 보았고, 뒤늦게 공부를 시작했고, 시행착오 끝에 저에게 맞는 투자 방법을 찾아가고 있는 사람입니다.</p>
<p>어쩌면 그렇기 때문에 이 책이 여러분에게 더 현실적으로 다가갈 수 있기를 바랍니다. 너무 멀리 있는 사람의 성공담이 아니라, 조금 먼저 헤매고 조금 먼저 공부한 사람의 기록으로 읽어주셨으면 합니다. 저는 여러분에게 완벽한 정답을 드리겠다고 말하고 싶지 않습니다. 다만 제가 직접 넘어지고 배운 것들, 그리고 그 과정에서 정리한 생각들이 여러분의 시행착오를 조금이라도 줄여줄 수 있다면 그것만으로도 이 책의 의미는 충분하다고 생각합니다.</p>
<p>이 책은 어려운 투자 이론을 자랑하기 위한 책이 아닙니다. 복잡한 금융 용어로 여러분을 압도하려는 책도 아닙니다. 오히려 그 반대입니다. 금융과 투자를 잘 모르는 분들도 천천히 읽으며 이해할 수 있도록, 가능한 한 쉽게 풀어쓰고 싶었습니다. 우리가 왜 돈을 알아야 하는지, 왜 투자해야 하는지, 왜 시장 전체를 사는 ETF가 평범한 개인에게 강력한 도구가 될 수 있는지, 그리고 왜 장기 투자가 중요한지 함께 이야기해보고 싶었습니다.</p>
<p>저는 이 책을 읽는 여러분이 대단한 투자자가 되기를 바라는 것이 아닙니다. 매일 시장을 예측하고, 남보다 빠르게 사고팔고, 복잡한 차트를 분석하는 사람이 되기를 바라는 것도 아닙니다. 그보다 훨씬 더 중요한 바람이 있습니다. 적어도 몰라서 손해 보지는 않으셨으면 좋겠습니다. 누군가의 그럴듯한 말에 속아 소중한 종잣돈을 잃지 않으셨으면 좋겠습니다. 열심히 번 돈이 구조도 모르는 금융 상품 속에서 새어나가지 않았으면 좋겠습니다. 세상 물정 모른다는 이유로, 금융을 잘 모른다는 이유로, 착실하게 살아온 사람이 손해 보는 일은 없었으면 좋겠습니다.</p>
<p>그 마음이 간절해서 펜을 들었습니다. 여러분이 이 책을 통해 돈을 조금 더 이해하고, 투자를 조금 덜 두려워하고, 스스로 납득할 수 있는 선택을 할 수 있게 된다면 더 바랄 것이 없습니다. 부족한 글이지만, 여러분의 시간과 삶에 작은 도움이 되기를 진심으로 바랍니다.</p>
<h1 id="프롤로그-경제적-자유가-보장되어야-일에-집중할-수-있다">프롤로그 - 경제적 자유가 보장되어야 일에 집중할 수 있다</h1>
<p>하루가 다르게 집값이 뛰었다는 소식이 들려온다. 누군가는 어떤 지역의 아파트를 샀는데 몇 달 만에 몇 억이 올랐다고 하고, 주식시장에서는 특정 종목이 급등해 큰돈을 벌었다는 이야기가 이어진다. 잠시도 조용할 틈이 없다. 여기에 더해 누군가는 코인으로 인생이 바뀌었다고 말한다. 몇 배, 몇십 배의 수익을 거뒀다는 말은 이제 낯설지도 않다.</p>
<p>조금 더 가까이로 시선을 옮기면, 더 현실적인 사례들도 들려온다. 평범하게 직장을 다니던 사람이 주택 경매를 시작해 사고파는 과정을 반복하다가 어느 순간 월급보다 더 많은 수익을 올리게 되었고, 결국 회사를 그만두었다는 이야기도 어렵지 않게 접할 수 있다. 이런 사례들은 더 이상 뉴스 속 이야기에 머물지 않는다. 우리의 일상 속에서 반복적으로 등장하고, 그 반복은 우리 삶에 적지 않은 영향을 미친다.</p>
<p>문제는 이러한 이야기들이 사실인지 아닌지가 아니다. 일부는 분명 사실이고, 실제로 그런 기회를 포착한 사람도 존재한다. 그러나 더 중요한 것은 그 이야기가 우리에게 어떤 영향을 미치느냐이다. 사람은 본능적으로 비교한다. 같은 출발선에 서 있다고 믿었던 누군가가 훨씬 빠르게 앞서나가고 있다는 느낌을 받는 순간, 마음은 쉽게 흔들린다.</p>
<p>내가 지금 제대로 가고 있는 건지에 대한 불확실한 마음이 머릿속을 떠나지 않게 된다. 이때부터 집중력은 서서히 무너진다. 눈앞의 업무는 여전히 중요하지만, 생각의 일부는 계속해서 다른 가능성을 계산하고 있다.</p>
<p>‘나도 저걸 해야 하나.’</p>
<p>‘지금이라도 늦지 않았을까.’</p>
<p>‘이대로 월급만 받아도 괜찮은 걸까.’</p>
<p>우리는 일하는 시간에도, 쉬는 시간에도, 보이지 않는 시장과 끊임없이 대화하고 있는 셈이다. 그리고 그 대화는 점점 우리의 판단을 흐리게 만든다. 본래의 역할에 온전히 몰입해야 할 시간에, 우리는 이미 다른 선택지를 고민하느라 에너지를 소모하고 있다.</p>
<p>여기서 한 가지 분명히 해야 할 사실이 있다. 경제적 자유가 없는 상태에서 완전한 집중을 기대하는 것은 생각보다 쉽지 않다는 점이다. 생계에 대한 불안, 기회를 놓칠지도 모른다는 초조함, 타인의 성과와 비교에서 오는 조급함은 모두 확신하지 못하는 마음에서 비롯한다. 이를 해결하지 못하는 한, 어떤 일에도 온전히 몰입하기는 어렵다.</p>
<p>그렇다고 해서 모두가 경매를 배우거나, 특정 자산에 과감하게 베팅하거나, 직장을 떠나는 선택을 해야 하는 것은 아니다. 오히려 그런 선택은 극히 일부에게만 맞는 길일 가능성이 높다. 대부분의 사람에게는 안정적인 수입이 있고, 그 수입을 기반으로 삶을 설계해 나간다. 중요한 것은 그 기반을 무너뜨리지 않으면서도, 동시에 마음이 흔들리지 않게 만드는 방법을 찾는 것이다.</p>
<p>많은 사람들이 전문적인 금융 지식이 없어서 자산을 증식하지 못한다고 생각한다. 이는 반만 맞고 반은 틀렸다. 우리는 전문 투자자와 같은 지식을 지닐 수 없고 그럴 필요조차 없다. 우리에게 필요한 것은 더 많은 정보가 아니라, 최소한의 지식과 흔들리지 않을 기준, 그리고 이를 실행할 수 있는 힘이다.</p>
<p>경제적 자유란 단순히 돈이 많은 결과적 상태를 의미하지 않는다. 적어도 이 책에서 말하는 경제적 자유는, 타인에게 흔들리지 않고 자신의 시간을 소유하며 스스로 선택할 수 있는 삶을 만들어가는 과정에 가깝다. 주변의 소음 속에서도 방향을 잃지 않는 것, 그리고 그 결과 지금 하고 있는 일에 온전히 몰입할 수 있는 것. 그것이 우리가 현실적으로 도달해야 할 자유다.</p>
<p>이 책은 그 자유를 얻기 위한 단순하면서도 강력한 방법을 제시한다. 이를 통해 흔들리지 않는 투자 철학을 확립하고, 그 위에서 우리는 비로소 일과 삶 모두에 온전히 전념할 수 있게 된다.</p>
<h1 id="제0장-금융-문맹-세상에-던져지다">🧭 제0장. 금융 문맹, 세상에 던져지다</h1>
<h2 id="0-1-통제된-삶에서-선택의-세계로">0.1 통제된 삶에서, 선택의 세계로</h2>
<p>나는 2007년 육군사관학교에 입학했다. 사관학교에 입학하면, 삶의 대부분이 정해진다. 아침에 일어나는 시간, 밥을 먹는 시간, 수업을 듣는 시간, 훈련을 받는 시간까지. 하루의 흐름은 촘촘하게 짜여 있고, 그 틀 안에서 움직이는 것이 당연한 일이 된다.</p>
<p>빡빡한 일정을 따라가다 보면 하루가 어떻게 지나가는지도 모르게 끝난다. 수업 시간에는 졸음을 참기 바빴고, 주말이 되면 오랜만에 주어진 자유를 만끽하기 위해 외출 혹은 외박으로 바깥으로 나가기 바빴다. 체력은 늘 부족했고, 생각할 여유는 많지 않았다. 핑계일 수 있지만 이런 상황에서 투자 공부는 더더욱 요원했다.</p>
<p>사관학교는 정예 장교를 양성하기 위한 곳이다. 우리는 이순신 장군을 포함한 역사의 위대한 장군들의 리더십을 배우고, 한국뿐만 아니라 동서양 세계의 전쟁사를 공부했다. 조직을 이끄는 방법, 야전에서의 실전감각, 군인정신은 물론, 위기 상황에서의 판단, 책임감과 사명감 같은 덕목들은 반복해서 강조되었다. 하지만 돈에 대해서는 아무도 이야기해주지 않았다.</p>
<p>사관학교를 졸업하면 바로 장교로 임관하고 월급을 받는다. 그 나이는 대략 24세 전후이며, 사회생활을 하는 다른 직장인들에 비해 더 이른 나이에 자산을 관리해야 하는 처지에 놓인다. 지금은 어떨지 모르지만 내가 생도 생활을 하던 당시에는 돈을 어떻게 관리하고, 어떻게 불려야 하는지에 대해서는 단 한 번도 체계적으로 배운 적이 없었다. 심지어 우리가 몸담고 있는 자본주의에 대해서도 철저히 무지했다.</p>
<p>생도 시절에는 큰돈이 필요하지도 않았다. 군에서 생도들에게 지급하는 품위유지비는 넉넉하지 않았지만, 대부분의 생활은 학교 안에서 해결되었기 때문이다. 품위유지비로 밖에 나가 좋은 음식을 먹고 문화생활을 하면 금세 바닥났다. 자연스럽게 돈은 벌면 &quot;쓰는 것&quot; 정도로만 인식되었고, 그 이상의 고민을 할 기회도, 필요도 없었다. 게다가 야전에 가면 집도 준다고 하니 이 한 몸 다 바쳐 국가를 위해 일할 일만 남은 듯했다.</p>
<p>하지만 졸업이 가까워질수록, 전혀 다른 세계가 눈앞에 펼쳐지기 시작했다. 어느 순간부터 학교에 낯선 사람들이 하나둘씩 찾아오기 시작했다. 처음에는 단순한 설명회 정도로 생각했다. 그러나 그들은 하나같이 어떤 상품을 들고 있었다. 치과보험, 실비보험, 변액보험, 원금보장보험. 거기에 각종 특약들이 덧붙고, 이름도 생소한 금융 상품들이 줄줄이 이어졌다. 설명은 길었고, 조건은 복잡했으며, 모든 상품은 마치 반드시 가입해야 할 것처럼 느껴졌다.</p>
<p>문제는, 나는 그중 무엇이 좋은지 판단할 기준이 전혀 없었다는 점이다. 누군가는 지금 가입하지 않으면 손해라고 했고, 누군가는 이 상품이 가장 안전하다고 했으며, 또 다른 누군가는 지금이 아니면 기회를 놓친다고 말했다. 정보는 넘쳐났지만, 그 정보를 걸러낼 기준은 없었다. 그럼에도 불구하고, 우리는 결정을 내려야 했다.</p>
<p>주변을 둘러보면, 이미 각자의 선택을 하고 있는 동기들이 있었다. 어떤 동기는 군인공제회에 최대한 많은 돈을 넣고, 그 자금을 기반으로 집을 사겠다고 했다. 또 다른 동기는 부모님이 하던 투자에 함께 참여하고 있었고, 누군가는 이미 주식을 시작했다. 비트코인을 한다는 동기도 있었고, 부동산 투자를 준비하고 있다는 친구도 있었다.</p>
<p>같은 출발선에 서 있었다고 생각했던 친구들이, 각자 전혀 다른 방향으로 움직이고 있었다. 그 속에서 나는 아무것도 하지 않는 선택을 했다. 손해 보지 말자. 내가 번 돈은 차곡차곡 모으고, 번 만큼만 쓰자. 당시에는 그것이 가장 합리적인 선택이라고 생각했다. 적어도 손해 보는 선택은 아니라고 믿었다. 하지만 그 생각은 오래가지 못했다.</p>
<p>졸업 이후, 동기들과의 거리는 자연스럽게 멀어졌다. 각자 맡은 임무가 있었고, 쉽사리 시간을 맞춰 만나기는 어려웠다. 그렇게 시간이 흐른 뒤, 오랜만에 만난 자리에서 나는 조금 다른 현실을 마주하게 되었다. 한 동기는 비트코인에 투자하고 있었다. 식사를 하던 중에도 가격이 올랐다며 웃었고, 결국 본인이 2차를 사겠다고 했다. 또 다른 동기는 군인공제회에 꾸준히 돈을 넣어왔고, 어느새 적지 않은 목돈을 만들었다고 했다.</p>
<p>그들의 이야기를 듣고 있는 동안, 나는 자연스럽게 내 손을 내려다보게 되었다. 그리고 깨달았다. 내 손에는 아무것도 없다는 사실을. 그 순간 들었던 감정은 단순한 부러움이 아니었다. 조금 더 근본적인 질문이 떠올랐다.</p>
<p>‘나는 지금 제대로 가고 있는 걸까.’</p>
<p>열심히 살아왔고, 해야 할 일은 충실히 해왔다. 그럼에도 불구하고, 어딘가 중요한 것을 놓치고 있다는 느낌을 지울 수 없었다. 그때 처음으로 알게 되었다. 문제는 내가 노력을 하지 않았기 때문이 아니라, 세상은 너무 넓었고 그 속에서 무엇을 해야 하는지 몰랐기 때문이라는 사실을.</p>
<p>도대체 이 넓은 세상 속 수많은 선택지 중에서, 최고의 투자법은 아니더라도 괜찮은 투자법을 알려주는 사람은 없을까?</p>
<h2 id="0-2-남이-해주는-투자는">0.2 남이 해주는 투자는...</h2>
<p>부모님께서는 돈 버는 즐거움도 알아야 한다면서 처음 1년은 좀 쓰라고 하셨다. 포병이었던 나는 전곡이라는 아주 작은 마을 근처 부대에 배치받았는데, 전곡에서도 부대까지 다니는 버스가 하루에 6대 정도밖에 없었다. 아침에 두 번, 오후에 두 번, 저녁에 두 번 이런 식이었다. 버스 시간을 놓치면 택시를 타야만 부대 밖으로 나갈 수 있었고, 가끔은 전곡에서 치킨이나 피자를 시키고 그 배달차를 타고 부대에 들어간 적도 있었다. 이런 시골에 갇혀 있다 보니 보상심리가 작동했다. 부모님의 말씀도 있겠다, 그래서 그동안 못 샀던 물건들을 샀다. 부모님께 작은 용돈도 드리고, 여자친구에게 선물도 샀다. 괜찮다는 노트북도 하나 새로 장만했고, 정장도 하나 맞췄다.</p>
<p>그렇게 첫 월급을 손에 쥔 지도 어느덧 1년이 넘었다. 소위 월급이 얼마나 되겠는가. 그렇게 쓰니 당연하게도 내 손에는 정말 아무것도 남지 않았다. 군 생활도 굉장히 힘들었다. 관측장교로 근무했기에 더우나 추우나 1년에 3분의 1은 훈련으로 야외에서 잤고, 부대 안에서는 5분대기조와 당직 등으로 주말과 평일을 가릴 것 없이 피로가 누적되었다. 무엇보다도 정신적으로 더욱 힘든 시간이었다. 인간관계에 서툴렀고 생도 시절 배운 고상한 리더십만을 생각하던 나는 부사관은 물론 병사들과도 잘 어울리지 못했다.</p>
<p>이렇게 군 생활과 돈에 대한 걱정이 함께 올라올 때 즈음, 현실을 탈출하고 새로운 길을 찾고자 기존의 포병에서 화생방 병과로 전과를 했다. 병과 교육기관인 화생방학교에서 오랜만에 공부다운 공부도 하며 군 생활에 대한 불안은 그나마 조금 잠잠해지고 있었다. 하지만 여전히 어떻게 돈을 관리해야 하는지는 의문투성이였다. 막연한 불안만 있을 뿐, 무엇을 어떻게 해야 하는지 전혀 감이 잡히지 않았다. 부모님 또한 투자는 부동산밖에 모르셨기에 투자에 관해 도움을 받기 어려웠다.</p>
<p>그러던 차에 화생방학교에 투자 전문가라는 사람이 강연을 나왔다. 그 사람은 그저 막연하게 투자하는 것이 아니라 시간을 단기, 중기, 장기로 나누어 체계적으로 투자해야 한다고 말했다. 그리고 돈이 없을 때 차를 사면 안 된다는 등, 마치 진심 어린 조언을 하는 것처럼 느껴졌다. 그러면서 자신이 장군들을 포함하여 여러 군인의 자산 관리를 해주고 있으니 관심 있으면 연락하라고 했다. 그의 말은 정답처럼 느껴졌고, 드디어 내가 갈망하던 믿음직스러운 투자 전문가를 만났다는 생각이 들었다.</p>
<p>그래, 내가 공부해서 투자할 거 아니면 전문가가 관리해주는 게 낫지 않을까. 그런 생각이 들어 강사에게 따로 연락을 했다. 강사는 친절하게도 서울에서 전라도 장성의 화생방학교까지 다시 발걸음을 해주었고, 강사의 조언에 따라 중기와 장기로 나누어 투자 계획을 세웠다. 중기 계획으로 3~7년 정도 바라보고 투자하는 적립식 펀드와 10년 이상 바라보는 변액보험에 가입했다. 특히 변액보험은 약 20퍼센트가량을 사업비로 떼고 나머지를 투자하지만, 장기적으로 보면 정말 좋은 투자 상품이라고 설명을 들었다. 그렇게 강사의 말만 철석같이 믿고 6년 이상을 투자했다.</p>
<p>지금 돌이켜보면 모두 말도 안 되는 것투성이었다. 단기, 중기, 장기로 나눠서 투자할 필요가 있을까? 돈은 많으면 많을수록 좋은 것 아닌가? 돈이 없을 땐 차를 사지 말라던 말도, 사치재로서만 필요 없다는 뜻이지 정말 필요한 사람은 사는 게 맞지 않나? 펀드는 또 어떠한가. 채권, 주식, 금리 등 아무것도 모르면서 남이 추천해 주는 펀드에 가입한 결과, 6년 넘게 두 개의 펀드에 투자해서 하나는 겨우 원금을 보전했고 다른 하나는 20퍼센트 이익을 냈다. 평균으로 보면 6년 동안 고작 연 3퍼센트 수익이 난 셈이다. 변액보험은 말할 것도 없다. 애초에 20퍼센트나 원금에서 떼가는데 무슨 수로 수익을 볼 수 있겠나. 그나마 다행인 건 더 투자하라는 권유에도 뭔가 싸한 느낌이 들어 추가로 납입한 적은 없다는 것이다.</p>
<p>결국 나는 결정을 내렸다. 이대로 시간을 보내는 것이 더 큰 손해라는 생각이 들었다. 은행 이자보다도 못한 상품들을 하루라도 빨리 정리해야 했다.</p>
<h2 id="0-3-믿음으로는-돈을-지킬-수-없다">0.3 믿음으로는 돈을 지킬 수 없다</h2>
<p>나는 화생방학교에 왔던 그 강사를 진심으로 믿었다. 그는 단순히 투자 상품을 설명하는 사람이 아니었다. 적어도 그때의 나에게 그는, 방향을 알려주는 사람이었다. 나는 그가 하는 말을 의심하기보다 이해하려고 노력했고, 이해되지 않는 부분조차도 결국은 &quot;내가 몰라서 그렇겠지&quot;라 생각하고 넘겼다. 간절히 바라면 이루어진다고 믿었지만, 세상은 내 믿음과는 전혀 별개의 것이었다.</p>
<p>결국 나는 그가 추천했던 기존 상품들을 모두 정리했다. 손해를 감수하면서라도 정리하는 것이 맞다고 판단했기 때문이다. 그때까지만 해도, 나는 그를 여전히 신뢰하고 있었다. 그리고 얼마 후, 그는 목돈이 있을 때만 들어갈 수 있는 정말 좋은 상품이 나왔다며 다시 연락을 해왔다. 설명을 들어보니 구조는 이랬다. 투자자들에게서 목돈을 모아, 원금은 유지한 채 그 이자 수익으로만 아주 공격적인 투자를 한다는 방식이었다. 이자 수익으로만 투자하기에 원금에는 손실이 발생하지 않고, 연 8퍼센트 정도의 수익이 예상된다고 했다. 만약 8퍼센트 이상 수익이 나면, 초과 수익은 브로커와 반씩 나눈다는 조건이었다.</p>
<p>지금 생각하면 이상한 점이 한두 가지가 아니었다. 원금을 그대로 두고, 이자만으로 연 8퍼센트의 수익을 낸다? 그때의 나는 나보다 더 공부도 많이 한 사람이 하는 말이라 조금은 의심스러웠지만 그의 말을 믿었다. 이미 한 번 믿은 사람이었고, 이번에는 정말 제대로 된 기회일 것이라고 믿고 싶었다. 결국 나는 결정을 내렸다. 그동안 아끼고, 참고, 버티면서 모아온 돈 3천만 원을 투자했다.</p>
<p>그 일이 벌어진 날을 아직도 잊지 못한다. 나는 아내와 함께 전주로 짧은 여행을 떠나 있었다. 오랜만에 군 생활에서 벗어나 여유를 느끼고 있던 시간이었다. 그때 전화 한 통이 걸려왔다. 그 강사였다. 전화를 받는 순간, 그의 목소리에서 평소와 다른 기색이 느껴졌다. 미안하다고 운을 떼는 그의 말에 순간 머릿속이 멈췄다. 그는 투자를 진행했던 사람이 사기죄로 경찰 조사를 받고 있고, 투자금은 사실상 회수가 어렵다고 말했다. 청천벽력 같은 이야기였다. 그 말을 듣는 순간, 세상이 무너지는 느낌이 어떤 것인지 처음으로 알게 되었다. 손이 떨렸고, 아무 말도 나오지 않았다. 그저 멍하니 전화를 붙잡고 있을 수밖에 없었다.</p>
<p>그날 밤, 나는 한동안 아무 말도 하지 못했다. 하지만 내 옆에는 아내가 있었다. 아내는 조용히 내 이야기를 듣더니, 담담하게 말했다.</p>
<p>&quot;어차피 잃은 돈이야. 잃은 돈은 돌아오지 않아. 앞으로 또 벌어 모으면 되지&quot;</p>
<p>그 말은 나에게 큰 위로가 되었다. 아내는 나에게 어떠한 책망도, 원망도 하지 않았다. 그저 현실을 받아들이는 말이었다. 덕분에 우리는 여행을 끝까지 마칠 수 있었다.</p>
<p>이후에도 강사는 연락을 해왔다. 울면서 미안하다고 했다. 자신이 더 꼼꼼히 알아보고 상품을 추천했어야 했다고 했다. 그의 목소리는 진심처럼 들렸다. 그게 사실이든 아니든 나는 끝까지 사람을 믿었다. 지금도 생각한다. 왜 그렇게까지 믿었을까. 나는 어렸고, 몰랐고, 허술했다. 그리고 무엇보다, 내가 몰랐기에 믿고 싶었다.</p>
<p>돌이켜보면 그것은 신뢰가 아니라 책임을 회피하기 위한 선택이었다. 내가 직접 공부하지 않아도 누군가가 대신 판단해주기를 바랐다. 강사를 탓하는 대신 나는 그 결과를 그대로 받아들이기로 했다. 그때 나는 비로소 깨달았다. 투자는 누군가를 믿는 행위가 아니라, 스스로 이해한 것에 책임을 지는 행위라는 것을.</p>
<p>몇 년이 지난 뒤, 우리 부부는 운 좋게도 신혼부부 특별공급으로 주택청약에 당첨되었다. 분양가는 4억 3천만 원. 계약을 하려면 계약금 10퍼센트, 4,300만 원이 필요했다. 여러 투자에서 실패한 나에게 그 돈은 결코 가벼운 금액이 아니었다. 게다가 30퍼센트에 해당하는 1억 3천만 원가량의 잔금도 치러야 했다. 영혼까지 다 끌어와도 잔금을 맞추기 힘들었다. 나는 아내에게 포기하자고 말했다. 하지만 아내는 나보다 훨씬 현명하고 단단한 사람이었다. 아내의 해보자는 한마디로 상황은 바뀌었다. 결국 우리는 계약금을 마련했고, 중도금도 어떻게든 가족들의 도움을 받아 맞출 수 있었다.</p>
<p>그 과정 속에서 나는 나 자신을 다시 보게 되었다. 왜 그렇게 아무것도 모르면서, 사람만 믿고 돈을 맡겼을까. 왜 스스로 이해하려 하지 않았을까. 그 질문은 오랫동안 나를 따라다녔다. 그리고 그 질문 끝에, 나는 하나의 결론에 도달했다. 이제는 달라져야 한다는 것. 누군가를 믿기 전에, 내가 먼저 이해해야 한다는 것. 그날 이후, 나는 처음으로 절실하게 투자를 공부해야겠다고 마음먹었다.</p>
<h2 id="0-4-스스로-해야-내-돈이다">0.4 스스로 해야 내 돈이다</h2>
<p>위의 이야기를 읽으면서 어떤 생각이 들었는가. 누군가는 왜 그런 선택을 했는지 이해하기 어렵다고 느꼈을지도 모른다. 조금만 더 따져봤다면 피할 수 있었던 일처럼 보일 수도 있다. 나 역시 시간이 지난 지금은 그렇게 생각한다. 하지만 그 모든 판단은 결과를 알고 난 뒤에야 가능해진다. 이를 사후 확증 편향이라고 한다.</p>
<p>태평양 전쟁 당시, 진주만 공습 이전에는 지금 보면 너무나 분명한 여러 공격 징후가 있었다고 한다. 그러나 그 당시 그 자리에 있던 사람들은 그 모든 조각을 하나의 결론으로 연결하지 못했다. 일본군의 공습은 없을 거라 생각했다. 후대의 시선에서는 분명하게 보이는 흐름도, 그 순간 안에 있는 사람들에게는 전혀 다른 의미로 받아들여진다. 이 이야기가 말해주는 것은 단순하다. 그 상황 속에 있지 않다면, 그때의 판단을 함부로 평가할 수 없다는 것이다.</p>
<p>나의 경우도 다르지 않았다. 그때의 나는 지금과 전혀 다른 위치에 있었다. 정보도 부족했고 경험도 없었다. 무엇보다 무엇을 기준으로 판단해야 하는지 알지 못했다. 그 상황 속에서는 나름대로 합리적인 선택이라고 믿었던 결정들이었다. 그리고 아마 이 글을 읽고 있는 대부분의 사람들도 비슷한 상황에 놓이면 크게 다르지 않은 선택을 했을 것이다.</p>
<p>중요한 것은 그때의 선택이 옳았느냐 틀렸느냐가 아니다. 더 중요한 것은 왜 그런 선택을 할 수밖에 없었는지다. 우리는 모두 제한된 정보와 경험 속에서 판단을 내린다. 정확히 말하면, 정보 자체가 부족하다기보다 정보를 어떻게 해석해야 하는지에 대한 이해가 부족한 상태에서 결정을 내린다. 문제는 그 판단을 떠받치고 있어야 할 기준이 없을 때 발생한다. 정보는 언제나 넘쳐난다. 투자와 관련된 이야기들은 끊임없이 쏟아지고, 그럴듯한 말들은 언제나 설득력을 가진다. 그러나 그 정보들을 연결하고 의미를 판단할 기준이 없다면, 많아진 정보는 도움이 되기보다 오히려 혼란을 키운다. 그 속에서 무엇을 걸러내고 무엇을 받아들여야 하는지를 결정하지 못하면, 선택은 결국 상황에 따라 흔들릴 수밖에 없다.</p>
<p>돌이켜보면 내가 겪은 일은 특별한 사례가 아니다. 오히려 누구에게나 충분히 일어날 수 있는 일이다. 그렇기 때문에 더 위험하다. 같은 방식의 선택은 반복되고, 비슷한 결과는 다시 나타난다. 역사는 반복되지 않는다, 사람이 반복할 뿐이라는 말이 있듯이, 이 흐름을 끊어내지 않으면 같은 문제는 계속해서 되풀이된다. 그래서 이제는 방향을 바꿔야 한다. 더 많은 정보를 찾는 것이 아니라, 흔들리지 않을 기준을 만들어야 한다. 어떤 상황에서도 스스로 판단할 수 있는 기반이 있어야 한다. 그것이 없다면, 아무리 좋은 기회처럼 보이는 선택도 결국은 또 다른 불안으로 이어질 뿐이다.</p>
<p>나는 그 이후로 투자에 대해 다시 바라보기 시작했다. 무엇을 사야 하는지를 찾는 것이 아니라, 왜 그런 선택을 해야 하는지를 이해하는 데 집중했다. 경제가 어떻게 움직이는지, 돈의 가치가 어떻게 변하는지, 금리와 시장이 어떤 관계를 가지는지 하나씩 정리해 나갔다. 처음에는 낯설고 어려웠지만, 기본 구조를 이해하기 시작하자 복잡해 보이던 것들이 점점 단순하게 보이기 시작했다. 그 과정에서 한 가지 분명해진 것이 있다. 투자는 특별한 기술이나 재능만으로 결정되는 영역이 아니라는 점이다. 그랬다면 가장 똑똑한 사람들이 가장 많은 돈을 벌었을 것이다. 오히려 최소한의 개념과 구조를 이해하고, 그 위에서 일관된 선택을 이어가는 것이 훨씬 중요하다. 복잡한 전략보다 단순하고 이해 가능한 방법이 더 강하다는 사실도 알게 되었다.</p>
<p>이 책은 그 과정에서 정리된 생각들을 담고 있다. 우리가 왜 쉽게 흔들리는지에 대한 심리적인 부분부터, 반드시 알고 있어야 할 최소한의 금융 지식, 그리고 개인이 현실적으로 선택할 수 있는 투자 방법까지 차근차근 다룰 것이다. 복잡한 이론이나 어려운 개념을 늘어놓기보다는, 실제로 적용할 수 있는 구조를 중심으로 설명하려고 한다. 특히 이 책에서는 레버리지 ETF를 활용한 장기 투자 방법을 중심으로 이야기할 것이다. 많은 사람들이 어렵거나 위험하다고 느끼는 영역이지만, 기본 원리를 이해하고 나면 생각보다 단순한 구조라는 것을 알 수 있다. 중요한 것은 어떤 상품을 선택하느냐가 아니라, 그 선택을 스스로 이해하고 유지할 수 있느냐이다.</p>
<p>이제는 더 이상 상황에 따라 흔들리지 않기 위해서, 그리고 같은 실수를 반복하지 않기 위해서, 기준을 세우는 과정이 필요하다. 이 책이 그 시작점이 되었으면 한다.</p>
<h1 id="제1장-기술-종목보다-먼저-알아야-할-인간-심리">🧠 제1장. 기술, 종목보다 먼저 알아야 할 인간 심리</h1>
<h2 id="1-1-사람-많은-곳에는-이유가-있다고">1.1 사람 많은 곳에는 이유가 있다고?</h2>
<p>사람 많은 곳에는 이유가 있다고들 말한다. 실제로도 그렇다. 사람들이 몰리는 곳에는 대개 그럴듯한 이유가 있다. 누군가는 돈을 벌었다고 하고, 누군가는 기회를 잡았다고 말한다. 그래서 우리는 자연스럽게 생각한다. 저 많은 사람들이 몰리는 데에는 분명 무언가 있을 것이라고. 하지만 여기서 한 번 멈춰서 생각해볼 필요가 있다. 정말로 사람 많은 곳에 답이 있다면, 이 세상에는 부자가 훨씬 더 많아야 하지 않을까.</p>
<p>현실은 그렇지 않다. 대부분의 사람들은 비슷한 선택을 하고, 비슷한 결과를 얻는다. 그리고 그 결과는 우리가 기대하는 방향과는 거리가 있는 경우가 많다. 왜 이런 일이 반복될까. 그 이유는 간단하다. 우리는 스스로 판단하기보다, 이미 많은 사람들이 선택한 길을 따라가는 데 익숙하기 때문이다. 아프리카 초원에서 시작한 인류의 DNA에 각인된 본능이다.</p>
<p>이를 심리학에서 군중심리라고 한다. 군중심리는 아주 단순한 원리에서 출발한다. 사람이 많다는 것은 곧 안전하다는 착각을 만들어낸다. 나 혼자만의 선택이 아니라는 점에서 심리적인 부담이 줄어들고, 그 선택이 틀릴 가능성도 낮아 보인다. 특히 그 선택을 통해 이미 누군가가 성공했다는 이야기가 더해지면, 그 판단은 더욱 확신에 가까워진다.</p>
<p>돈을 번다는 것은 단순히 좋은 정보를 아는 것만으로 이루어지지 않는다. ≪돈의 속성≫의 저자인 김승호 회장은 돈을 벌기 위해서는 반드시 어떤 장벽을 넘어야 한다고 말한다. 이 말은 생각보다 중요하다. 그 장벽이 존재하기 때문에 모두가 쉽게 접근하지 못하고, 그 결과로 차이가 발생하기 때문이다. 만약 누구나 쉽게 할 수 있고 아무런 저항 없이 들어갈 수 있는 영역이라면, 그 안에는 이미 수많은 사람이 몰려 있을 것이고 그만큼 기회는 줄어들 수밖에 없다.</p>
<p>우리가 흔히 떠올리는 예를 보자. 어떤 영역은 법이라는 강한 장벽이 존재한다. 마약이나 도박처럼 법적으로 금지된 영역은 그 자체로 접근이 제한된다. 물론 이 예시는 바람직한 방향은 아니지만, 분명한 것은 아무나 쉽게 넘지 못하는 장벽이 존재한다는 점이다. 또 다른 영역은 사회적 인식이라는 장벽이 있다. 장의사처럼 반드시 필요한 직업임에도 불구하고, 많은 사람들이 쉽게 선택하지 못하는 이유는 그에 대한 인식 때문이다. 그 결과, 그 영역에는 상대적으로 경쟁이 적고, 다른 형태의 기회가 생긴다.</p>
<p>부동산도 마찬가지다. 좋은 부동산에 투자하려면 상당한 자본금이 필요하다. 이 자본금이라는 장벽은 많은 사람들을 자연스럽게 걸러낸다. 그래서 그 안에 들어갈 수 있는 사람은 제한되고, 그 안에서의 기회는 또 다른 형태로 만들어진다. 결국 돈을 번다는 것은 단순히 좋은 선택을 하는 것이 아니라, 많은 사람들이 넘지 못하는 어떤 경계를 넘어서는 과정과 맞닿아 있다.</p>
<p>그런데 군중심리는 이와 정반대 방향으로 우리를 끌고 간다. 이미 많은 사람이 몰려 있는 곳, 이미 결과가 드러난 곳, 이미 성공 사례가 넘쳐나는 곳으로 우리를 이끈다. 그곳은 안전해 보이고, 검증된 것처럼 느껴지기 때문이다. 하지만 바로 그 지점에서 우리는 중요한 사실을 놓치게 된다. 이미 많은 사람이 알고 있는 정보는 더 이상 기회가 아니라는 점이다.</p>
<p>주식 시장에서도 비슷한 장면을 쉽게 볼 수 있다. 특정 종목이 급등했다는 뉴스가 나오고, 주변 사람들이 그 이야기를 하기 시작하면 그때서야 관심을 가지는 경우가 많다. 그리고 뒤늦게 뛰어든다. 하지만 그 시점은 이미 많은 사람들이 들어와 있는 상태이고, 기대감이 가격에 반영된 이후일 가능성이 높다. 결국 그 선택은 기회가 아니라 위험에 가까워진다.</p>
<p>이것은 단순히 투자에만 해당되는 이야기가 아니다. 인생에서도 마찬가지다. 사람들이 많이 가는 길은 분명 안정적일 수 있다. 하지만 그 길에서 얻을 수 있는 결과 또한 평균에 가까워질 가능성이 높다. 반대로 다른 길을 선택하려면 불안과 의심을 견뎌야 한다. 주변의 시선, 스스로의 확신 부족, 결과에 대한 불확실성 같은 것들이 하나의 장벽이 되어 앞을 가로막는다. 그래서 우리는 자주 선택한다. 덜 불안한 길을. 이미 많은 사람들이 선택한 길을. 그리고 그 선택은 우리를 다시 군중 속으로 돌려보낸다.</p>
<p>군중심리에 떠밀려서는 결코 부자가 될 수 없다. 투자에서든, 인생에서든 마찬가지다. 사람들의 방향이 아니라, 나의 기준으로 선택할 수 있어야 한다. 그리고 그 기준은 누군가가 만들어주는 것이 아니라, 스스로 만들어가는 것이다.</p>
<p>이 책에서 다룰 레버리지 ETF의 가장 큰 장벽은 &#39;인내의 시간&#39;이다. 이 또한 많은 사람들이 쉽게 넘지 못하는 장벽이다. 이 장벽을 넘을 준비가 되었는가?</p>
<h2 id="1-2-불필요한-비교는-나를-망친다">1.2 불필요한 비교는 나를 망친다</h2>
<p>사촌이 땅을 사면 배가 아프다는 말이 있다. 누군가가 큰 이익을 얻었다는 이야기를 들으면 이유 없이 속이 쓰리고, 마음이 급해진다. 나도 모르게 비교가 시작되고, 지금 내가 무엇을 하고 있는지보다 남이 무엇을 했는지에 더 집중하게 된다. 이러한 심리를 일반적으로 비교심리 혹은 사회적 비교라고 한다. 인간은 본능적으로 자신을 타인과 비교하며 자신의 위치를 확인하려는 경향이 있다. 이는 생존과 적응의 과정에서 자연스럽게 형성된 심리다. 문제는 이 심리가 투자에서는 거의 항상 잘못된 방향으로 작동한다는 점이다.</p>
<p>비교심리는 왜 이렇게 강하게 작용할까. 사람은 절대적인 기준보다 상대적인 기준에 훨씬 민감하게 반응한다. 내가 100을 벌었는지는 크게 중요하지 않다. 옆 사람이 200을 벌었다는 사실이 더 크게 다가온다. 특히 그 사람이 나와 비슷한 환경에 있다고 느낄수록 그 감정은 더 강해진다. 여기서 조바심이 생긴다. 나만 뒤처지고 있는 것 같은 느낌, 지금이라도 따라잡아야 할 것 같은 압박이 만들어진다. 그리고 그 압박은 곧 성급한 선택으로 이어진다.</p>
<p>문제는 사람들이 비교할 때 전체 과정을 보지 않는다는 데 있다. 누군가가 얼마를 벌었다는 ‘결과’만 본다. 그 사람이 어떤 과정을 거쳤는지, 얼마나 오랜 시간 동안 준비했는지, 그 사이에 어떤 손실을 겪었는지는 거의 관심을 두지 않는다. 수학으로 비유하자면 누적된 흐름(적분)에는 관심이 없고, 어느 한 순간의 변화량(미분)에만 집착하는 것과 같다. 하지만 투자는 한순간의 결과로 평가할 수 있는 것이 아니다. 긴 시간 동안 어떤 선택을 반복했는지가 결국 결과를 만든다.</p>
<p>이러한 사고방식은 자연스럽게 단기적인 성과에 집착하게 만든다. 지금 당장 수익이 나는지, 남들보다 더 빨리 결과를 얻는지에 집중하게 된다. 하지만 이렇게 접근하면 안정적인 수익을 만들어내기는 어렵다. 오히려 변동성에 휘둘리고, 감정에 따라 선택이 바뀌며, 결국 일관성을 잃게 된다. 투자에서 가장 중요한 것은 한 번의 선택이 아니라 같은 선택을 얼마나 오래 유지할 수 있는가이다.</p>
<p>여기서 한 가지 흥미로운 사례를 생각해볼 수 있다. 죄수의 딜레마라는 문제가 있다. 두 명의 공범이 잡혀 각각 따로 심문을 받는다. 둘 다 침묵하면 비교적 가벼운 처벌을 받지만, 한 사람이 상대를 배신하면 배신한 사람은 풀려나고 상대는 무거운 처벌을 받는다. 반대로 둘 다 서로를 배신하면 둘 다 중간 정도의 처벌을 받는다. 이 상황에서 각 개인의 입장에서는 상대를 배신하는 것이 가장 합리적인 선택처럼 보인다. 그러나 두 사람이 모두 그렇게 행동하면 결국 둘 다 더 나쁜 결과를 얻게 된다.</p>
<p>이 문제를 확장해 실제 실험한 사례가 있다. 정치학자 로버트 액설로드는 여러 전략을 컴퓨터 프로그램으로 만들어 반복 게임을 진행하는 대회를 열었다. 각 전략은 상대와 계속해서 상호작용하며 점수를 쌓아간다. 여기서 흥미로운 결과가 나왔다. 가장 복잡하고 공격적인 전략이 아니라, 매우 단순한 전략이 우승을 차지했다.</p>
<p>그 전략이 바로 팃포텟이다. 처음에는 협력으로 시작하고, 이후에는 상대가 한 행동을 그대로 따라 하는 방식이다. 상대가 협력하면 나도 협력하고, 상대가 배신하면 나도 다음에 배신한다. 구조 자체는 매우 단순하다. 팃포텟은 일대일로는 누구도 확실하게 이기지 못한다. 게다가 단기적으로 보면 상대보다 더 좋은 결과를 내기 어렵다. 공격적으로 상대를 압도하는 전략도 아니고, 교묘하게 이익을 빼앗는 방식도 아니다. 그럼에도 불구하고 이 전략은 15개의 프로그램이 참가한 첫 번째 대회에서 우승을 차지했다.</p>
<p>여기서 끝이 아니었다. 이 결과를 바탕으로 더 많은 연구자들이 참여해 두 번째 대회가 열렸다. 이번에는 첫 번째 대회의 결과와 전략들이 모두 공개된 상태였고, 훨씬 더 많은 프로그램이 참가했다. 참가 수는 60개를 넘었고, 그중에는 훨씬 더 복잡하고 정교한 전략들도 포함되어 있었다. 상대의 행동을 예측하거나, 여러 단계를 계산해 대응하는 프로그램들도 등장했다. 하지만 그 많은 복잡한 전략들 사이에서, 가장 단순한 전략 중 하나였던 팃포텟이 또 다시 우승을 차지했다.</p>
<p>이 결과가 주는 메시지는 두 가지다. 전략은 복잡할 필요도 없고, 옆에 있는 누군가보다 반드시 잘할 필요도 없다는 것이다. 사람들은 종종 더 좋은 결과를 얻기 위해 더 복잡한 전략을 찾는다. 더 많은 정보를 분석하고, 더 정교한 판단을 하려고 한다. 하지만 이 실험은 정반대의 결과를 보여준다. 복잡함이 항상 우위를 보장하지 않는다. 오히려 중요한 것은 단순한 방법이라 할지라도 좋은 방법을 고르고, 전체 과정에서 안정적으로 살아남고, 일관된 선택을 반복하는 것이다. 이렇게 할 수 있다면 일대일 혹은 단기 승부에서는 이기지 못하더라도, 장기적이고 전체적인 그림에서는 더 나은 결과를 얻을 수 있다.</p>
<p>투자도 마찬가지다. 비교심리는 우리에게 계속해서 옆 사람을 이기라고 말한다. 하지만 더 많이 배워서 복잡한 포트폴리오를 짜야 하는 것도 아니고 옆에 있는 누군가보다 더 벌 필요도 없다. 자신의 기준으로 꾸준히 나아가면 된다.</p>
<h2 id="1-3-돈은-그냥-돈이다">1.3 돈은 그냥 돈이다</h2>
<p>로마 황제 베스파시아누스에 대한 일화가 있다. 그는 재정을 확보하기 위해 공중화장실에 세금을 부과했다. 이를 두고 아들이 반발하자, 황제는 세금으로 거둔 돈을 건네며 물었다. 냄새가 나느냐고. 아들이 아니라고 답하자, 그는 말했다. 돈에서는 냄새가 나지 않는다. 이 짧은 일화는 꽤 강한 메시지를 담고 있다. 돈은 어디에서 왔는지, 어떤 과정을 거쳤는지, 돈이 가진 스토리와 상관없이 그 자체로 그저 돈이라는 사실이다. 우리는 거의 매번 돈에 의미를 부여한다. 깨끗한 돈, 더러운 돈, 쉽게 번 돈, 힘들게 번 돈. 하지만 돈의 입장에서 보면 그런 구분은 존재하지 않는다. 돈은 그저 돈일 뿐이다.</p>
<p>이 이야기를 꺼낸 이유는, 우리가 돈을 다루는 방식이 생각보다 감정에 크게 영향을 받기 때문이다. 예전에 나는 ≪4개의 통장≫ 같은 책을 읽으며 돈을 관리하는 방법에 대해 고민한 적이 있다. 수입을 나누고, 용도별로 통장을 분리하고, 미리 빼두어야 돈을 아낄 수 있다는 이야기였다. 시중에는 비슷한 이야기를 하는 책이 많다. 물론 이런 방식이 분명 도움이 되는 사람도 있다. 하지만 다른 책들을 읽으며 꼭 그렇게까지 해야 할까 하는 의구심이 들었다.</p>
<p>돈을 쪼개서 관리하지 않으면 우리는 돈을 제대로 쓰지 못하는 걸까. 결국 이런 방식은 하나의 전제를 깔고 있다. 사람은 스스로를 통제하기 어렵기 때문에 구조적으로 막아야 한다는 것이다. 그래서 일부러 불편하게 만들고, 일부러 제한을 두는 것이다. 물론 효과는 있다. 하지만 본질적인 해결이라고 보기는 어렵다. 우리가 아는 부자들이 과연 그렇게 했을까. 그보다는, 내 생각에 그들은 뭔가 본질을 알고 있다는 느낌이 들었다.</p>
<p>한 번 이런 상황을 떠올려 보자. 예상하지 못한 돈이 생겼다. 보너스일 수도 있고, 선물일 수도 있고, 누군가에게서 받은 용돈일 수도 있다. 이 돈은 평소의 수입과는 다르게 느껴진다. 그래서 더 쉽게 쓰게 된다. 평소에는 고민했을 소비도, 이 돈 앞에서는 쉽게 결정된다. 왜 그럴까. 그 돈이 특별해서가 아니다. 우리가 그 돈에 특별한 의미를, 스토리를 부여했기 때문이다. 사람들은 스토리에 열광한다.</p>
<p>이건 내가 직접 겪었던 일이기도 하다. 부모님이 아이 생일이라고 용돈을 보내주시면, 괜히 더 좋은 것을 사주고 싶어진다. 평소에는 고민하던 선택도 그 순간에는 쉽게 결정된다. 이유는 간단하다. 아이들에게 선물을 사주고 외식이라도 하라고 주신 스토리가 있는 돈이기 때문이다. 하지만 평소에 충분히 장난감을 사주고 있고, 외식도 하기에 나는 더 이상 스토리에 흔들리지 않는다. 주식이 조금이라도 오르면 어떤가. 다른 이한테 자랑하고 싶고, 술이라도 한 잔 하고 싶지 않은가. 실현된 이익은 아직 없는데도 말이다. 설사 팔아서 이득을 봤더라도 그건 그저 돈이다. 운 좋게 벌었든 뭐 하든 그냥 돈이다.</p>
<p>내가 번 돈이든, 누군가에게 받은 돈이든, 그 가치는 달라지지 않는다. 그럼에도 불구하고 우리는 그 돈을 다르게 취급한다. 그리고 그 차이가 결국 소비로 이어진다. 그래서 많은 사람들이 통장을 나누라고 말한다. 돈의 용도를 구분하고, 미리 빼두고, 구조적으로 통제하라고 말한다. 이것 역시 하나의 방법이다. 하지만 조금 더 근본적인 인간의 심리에 대해 생각해볼 필요가 있다.</p>
<p>나는 통장을 나누지 않고도 충분히 돈을 관리할 수 있다고 믿는다. 중요한 것은 구조가 아니라 기준이다. 돈을 어떻게 나누느냐보다, 그 돈을 어떻게 바라보느냐가 더 중요하다. 돈에 의미를 덧붙이는 순간, 판단은 흔들리기 시작한다. 이 돈은 괜찮겠지, 이번 한 번은 괜찮겠지, 부모님이 주셨으니, 이런 생각들이 쌓이면서 결국 일관성을 잃게 된다. 반대로 단 하나의 기준만 명확하다면, 상황은 훨씬 단순해진다.</p>
<p><strong>돈은 그냥 돈이다.</strong></p>
<p>이 기준이 머릿속에 자리 잡기 시작하면, 굳이 복잡한 구조를 만들 필요가 없어진다. 어떤 돈이든 동일하게 판단할 수 있게 된다. 소비를 할 때도, 투자를 할 때도 같은 기준이 적용된다. 이 돈이 어디에서 왔는지, 어떤 스토리를 지녔는지는 중요하지 않다. 중요한 것은 이 돈이 앞으로 어떤 역할을 하게 될지다. 돈은 많이 모을수록 좋다. 그 단순한 사실을 굳이 복잡하게 만들 필요는 없다. 괜히 쪼들리는 것처럼 살 필요도 없고, 일부러 나를 제한할 필요도 없다. 대신 더 중요한 것은, 어떤 상황에서도 흔들리지 않는 기준을 만드는 것이다.</p>
<p>&#39;돈은 그냥 돈이다&#39;라는 이 단순한 생각 하나가 자리 잡는 순간, 우리는 더 이상 상황에 따라 돈을 다르게 쓰지 않게 된다. 그리고 그때부터 비로소 돈을 모으는 방식도 훨씬 단순해진다.</p>
<h2 id="1-4-나는-다르겠지">1.4 나는 다르겠지</h2>
<p>워비곤 호수 효과라는 말이 있다. 미국의 한 라디오 프로그램에서 유래한 표현으로, 모든 아이들이 평균 이상이라고 믿는 마을을 의미한다. 말 그대로라면 성립할 수 없는 이야기지만, 이 표현이 오랫동안 회자되는 이유는 그것이 인간의 본능적인 착각을 정확히 짚어내고 있기 때문이다. 사람은 자신을 객관적으로 평가하기보다, 실제보다 조금 더 나은 존재로 인식하려는 경향이 있다. 평균이라는 기준은 분명 존재하지만, 그 기준 아래에 있다고 스스로 인정하는 사람은 많지 않다. 우리는 대부분 자신이 평균보다 낫다고 생각하며 살아간다.</p>
<p>이러한 현상은 우리 주변 어디에서나 쉽게 발견할 수 있다. 많은 교수들은 자신이 강의를 꽤 재미있게 한다고 생각한다. 학생들이 지루해하지 않을 것이라 믿고, 자신의 설명이 충분히 전달되고 있다고 느낀다. 하지만 정작 학생들에게 물어보면 전혀 다른 반응이 돌아오는 경우가 많다. 강의가 지루하다는 평가, 이해하기 어렵다는 의견이 적지 않다. 교수의 자기 인식과 학생의 실제 경험 사이에는 분명한 간극이 존재한다.</p>
<p>비슷한 장면은 일상적인 관계에서도 반복된다. 결혼 생활을 떠올려보자. 집안일을 나누어 한다고 가정했을 때, 각자는 스스로 꽤 많이 하고 있다고 생각한다. 나는 적어도 60퍼센트는 하고 있다고 느끼는데, 상대는 내가 절반도 하지 않는다고 생각할 수 있다. 상대 역시 자신이 더 많이 하고 있다고 믿는다. 서로의 기준이 다르기 때문에, 각자는 자신이 더 기여하고 있다고 확신한다. 이 역시 객관적인 수치가 아니라, 주관적인 인식이 만들어낸 결과다.</p>
<p>문제는 이런 심리가 투자에서도 그대로 작동한다는 점이다. 우리는 과거의 실패 사례를 보면서도 그 실패가 나에게는 적용되지 않을 것이라고 생각한다. 남들은 손해를 봤지만 나는 타이밍을 볼 줄 안다고 믿는다. 다른 사람은 욕심을 부려서 망한 것이고, 나는 적절한 시점에 빠져나올 수 있다고 생각한다. 이미 늦었다는 신호가 분명한 상황에서도, 나만큼은 예외가 될 수 있다고 기대한다. 레버리지가 위험하다고 말해도 나는 감당할 수 있을 것 같고, 변동성이 큰 시장에서도 나는 흔들리지 않을 것이라 믿는다. 이 모든 생각의 출발점은 단 하나다. 나는 다르다는 믿음이다.</p>
<p>하노 백의 ≪부자들의 생각법≫에는 이런 예시가 나온다. 동전을 몇 번 던져보고 다음 동전이 뭐가 나올지 예측해 보는 것이다. 몇 번 동전을 던지다 보면 묘한 느낌이 든다. 앞면이 연속으로 나오면 이제는 뒷면이 나올 차례 같고, 반대로 앞뒤가 번갈아 나오면 어떤 패턴이 있는 것처럼 보인다. 심지어 몇 번 더 던져보면, 마치 내가 흐름을 읽고 있는 것 같은 착각이 들기도 한다. 이제는 다음 결과를 어느 정도 예측할 수 있을 것 같다는 생각이 자연스럽게 따라온다. 하지만 실제로는 그렇지 않다. 동전은 이전 결과와 아무런 관계가 없다. 앞면이 열 번 연속으로 나왔더라도, 다음 결과는 여전히 50퍼센트의 확률로 결정된다. 우리가 보고 있는 ‘흐름’이나 ‘패턴’은 실제로 존재하는 것이 아니라, 우리의 뇌가 만들어낸 착각에 가깝다.</p>
<p>문제는 우리가 이 착각을 너무 쉽게 믿어버린다는 점이다. 그리고 이 착각은 투자에서도 그대로 반복된다. 주가가 몇 번 연속으로 오르면 계속 오를 것 같고, 반대로 몇 번 떨어지면 이제는 반등할 것 같다는 생각이 든다. 우리는 과거의 움직임 속에서 의미를 찾고, 그 의미를 바탕으로 미래를 예측하려 한다. 하지만 시장 역시 동전과 크게 다르지 않다. 이미 지나간 가격의 움직임이 다음 결과를 보장해주지 않는다. 그럼에도 불구하고 우리는 계속해서 패턴을 찾고, 그 패턴을 근거로 자신감을 만들어낸다. 그리고 그 자신감 위에 더 큰 결정을 쌓는다. 결국 여기서 다시 같은 지점으로 돌아오게 된다. 나는 다를 것이라는 믿음이다.</p>
<p>이럴 때마다 나는 아이작 뉴턴과 알베르트 아인슈타인을 떠올린다. 뉴턴은 고전 물리학의 아버지라 불린다. 만유인력의 법칙을 정립하고, 미적분학의 기초를 세우며, 자연 현상을 수학적으로 설명할 수 있는 틀을 만든 인물이다. 우리가 알고 있는 대부분의 물리 법칙은 그의 업적 위에 세워져 있다. 아인슈타인은 현대 물리학의 아버지다. 상대성 이론을 통해 시간과 공간의 개념을 완전히 새롭게 정의했고, 질량과 에너지의 관계를 밝혀내며 물리학의 지평을 넓혔다. 두 사람 모두 인류 역사에서 손꼽히는 지적 능력을 가진 천재들이다.</p>
<p>하지만 이들조차 투자에서는 예외가 아니었다. 뉴턴은 남해회사 주식에 투자했다가 큰 손실을 입었다. 초기에는 수익을 내고 빠져나왔지만, 주변 사람들이 계속 돈을 벌고 있다는 소식에 다시 들어갔다가 결국 큰돈을 잃었다. 그는 이후 이렇게 말했다고 전해진다. 나는 천체의 움직임은 계산할 수 있지만, 인간의 광기는 계산할 수 없다고.</p>
<p>이 사례가 의미하는 바는 분명하다. 뉴턴이라고, 아인슈타인이라고 해서 스스로 다르다고 생각하지 않았겠는가. 인류 역사에 남을 천재들조차도 말이다. 힘과 물질의 본질과 패턴을 파악한 그들이 투자 역시 흐름을 읽을 수 있을 것이라 생각한 것은 자연스럽다. 그들은 남들과는 다른 판단을 할 수 있을 것이라 믿었을 것이다. 하지만 결과는 다르지 않았다. 한편으로 이 이야기가 주는 교훈은 지능의 문제가 아니라는 것이다. 세상에서 가장 뛰어난 지성을 가진 사람들조차 시장 앞에서는 예외가 아니었다. 그들도 군중의 흐름에 영향을 받았고, 그들도 타이밍을 놓쳤다. 그렇다면 우리는 얼마나 다를 수 있을까.</p>
<p>투자에서 필요한 것은 자신감이 아니라 겸손이다. 내가 틀릴 수 있다는 전제, 내가 시장을 완전히 이해하지 못한다는 인식, 그리고 언제든 판단이 흔들릴 수 있다는 사실을 받아들이는 태도다. 세상에 다시 나올까 말까 한 천재들도 투자에서 실패했다. 반면 평범한 사람 중 일부는 투자에 성공했다.</p>
<p>나는 다르겠지라는 생각이 들 때, 한 발짝 떨어져서 바라볼 수 있어야 한다. 지금의 선택이 정말 합리적인 것인지, 아니면 나는 다르다는 착각 위에 세워진 것인지 스스로에게 물어야 한다. 그 순간 한 번 멈추고, 내가 보고 있는 것이 전체인지 일부인지 다시 확인해야 한다. 그리고 그 질문을 반복하는 것만으로도, 우리는 훨씬 더 나은 선택을 할 수 있게 된다.</p>
<p>아직도 본인이 뉴턴이나 아인슈타인보다 더 똑똑하다고 생각하는가. 그들의 삶에서 교훈을 얻었길 바란다.</p>
<h2 id="1-5-손실은-이익보다-더-크게-느껴진다">1.5 손실은 이익보다 더 크게 느껴진다</h2>
<p>사람은 같은 크기의 이익과 손실을 다르게 느낀다. 100만 원을 벌었을 때의 기쁨보다, 100만 원을 잃었을 때의 고통이 훨씬 더 크게 다가온다. 이 현상을 심리학에서는 손실 회피 성향이라고 부른다. 행동경제학에서 매우 중요하게 다루는 개념으로, 인간이 얼마나 비합리적인 선택을 하는지를 잘 보여주는 대표적인 사례다. 이 개념을 처음 접하면 이렇게 생각할 수도 있다. 손해를 싫어하는 것은 당연한 것 아닌가. 하지만 문제는 이 성향이 단순한 감정 수준을 넘어서, 우리의 판단 자체를 왜곡시킨다는 데 있다. 우리는 손실을 피하려는 욕구 때문에, 더 좋은 선택을 외면하고 오히려 더 나쁜 선택을 하기도 한다.</p>
<p>사실 이 심리는 우연히 생긴 것이 아니다. 우리의 유전자가 그렇게 설계되어 있기 때문이다. 원시 인류를 떠올려 보자. 그들은 가끔 운 좋게 과실을 얻거나 사냥에 성공할 수 있었지만, 동시에 끊임없이 위험에 노출되어 있었다. 과실과 고기를 얻으면 며칠의 에너지원을 얻은 셈이다. 하지만 한 번의 실수, 한 번의 손실이 생존 자체를 위협할 수 있는 환경이었다. 만약 손실을 충분히 강하게 인식하지 못했다면, 위험을 피하지 못했을 것이고, 그런 유전자는 지금까지 이어지지 못했을 가능성이 크다. 다시 말해 우리는 본능적으로 손실을 과도하게 크게 느끼도록 설계되어 있다.</p>
<p>문제는 그 본능이 지금의 환경에서는 오히려 방해가 된다는 점이다. 예를 하나 들어보자. 두 가지 선택지가 있다. 하나는 50퍼센트 확률로 1억 원을 받는 선택이고, 다른 하나는 100퍼센트 확률로 1천만 원을 받는 선택이다. 수학적으로 보면 기대값은 전자가 5천만 원으로 훨씬 높다. 장기적으로 반복할 수 있다면 전자를 선택하는 것이 훨씬 유리하다. 하지만 많은 사람들은 쉽게 결정을 내리지 못한다. 오히려 확실하게 1천만 원을 받는 선택을 더 안전하게 느낀다. 1억 원을 얻지 못할 가능성, 즉 아무것도 얻지 못하는 상황이 너무 크게 느껴지기 때문이다. 기대값은 더 높지만, 손실에 대한 두려움이 그 판단을 압도한다. 우리는 여전히 원시 환경에서처럼 손실을 생존의 위협으로 받아들이고 있는 것이다.</p>
<p>이런 경우는 어떨까. 예를 들어 동전을 던져서 앞면이 나오면 10만 원을 잃고, 뒷면이 나오면 15만 원을 얻는 게임이 있다고 해보자. 이 역시 기대값은 분명히 이득이다. 하지만 대부분의 사람들은 이 제안을 쉽게 받아들이지 않는다. 손실이 포함되어 있다는 이유만으로 거부하게 된다. 이득이 손실의 두 배는 되어야 사람들이 내기를 받아들인다는 연구 결과도 있다. 당신이라면 앞면이 나오면 10만 원을 잃는 게임에서, 뒷면에 얼마를 줘야 게임에 참여하겠는지 한 번 생각해 보라.</p>
<p>이러한 심리는 투자에서 더욱 극명하게 드러난다. 주가가 떨어지면 사람들은 쉽게 팔지 못한다. 손실을 확정 짓는 것이 너무 고통스럽기 때문이다. 그래서 조금만 기다리면 오르겠지라는 생각으로 계속 들고 있는다. 반대로 주가가 조금이라도 오르면 어떻게 할까. 더 오를 가능성이 있음에도 불구하고, 지금의 이익을 확정 짓고 싶어서 서둘러 팔아버린다. 결국 결과는 손실은 오래 끌고 가고, 이익은 빨리 확정 짓는데 이건 투자에서 가장 좋지 않은 패턴이다. 손실은 크게, 이익은 작게 만드는 구조이기 때문이다. 그런데도 많은 사람들이 이 패턴에서 벗어나지 못한다. 이유는 단순하다. 손실이 주는 고통이 이익이 주는 기쁨보다 훨씬 강하기 때문이다.</p>
<p>조금 더 나아가면 더 위험한 선택으로 이어지기도 한다. 이미 손실이 발생한 상황에서, 그 손실을 만회하기 위해 더 큰 위험을 감수하는 경우가 있다. 원래라면 피해야 할 선택인데도, 손실을 인정하기 싫다는 이유로 더 깊이 들어가는 것이다. 결국 우리는 이익이 날 때는 지나치게 보수적으로, 손실이 날 때는 지나치게 공격적으로 변한다. 이 두 가지가 동시에 작용하면서, 우리의 투자 결과는 점점 더 왜곡된다. 그래서 투자에서는 감정을 이기라는 말을 자주 한다. 하지만 감정을 완전히 없애는 것은 불가능하다. 중요한 것은 감정을 없애는 것이 아니라, 그 감정이 어떤 방향으로 나를 끌고 가는지를 이해하는 것이다.</p>
<p>손실 회피 심리를 이해하면, 한 가지 중요한 사실을 깨닫게 된다. 우리가 느끼는 고통은 실제 손실보다 과장되어 있다는 점이다. 그리고 그 과장된 감정 때문에, 우리는 더 좋은 선택을 놓치고 있다는 사실이다. 중요한 것은 개별 선택에서의 감정이 아니라, 전체 흐름에서의 기대값이다. 기대값이 높은 선택을 반복할 수 있다면, 단기적인 손실 혹은 등락은 결국 지나가는 과정에 불과하다. 하지만 손실 회피 심리에 사로잡히는 순간, 우리는 이 단순한 원칙을 지키지 못하게 된다.</p>
<p>그러니 다시 한 번 스스로에게 물어볼 필요가 있다. 나는 지금 합리적인 선택을 하고 있는가, 아니면 손실을 피하고 싶은 감정에 끌려가고 있는가.</p>
<h2 id="1-6-기대값을-계산하라">1.6 기대값을 계산하라</h2>
<p>역사는 반복되지 않지만 사람은 반복된다는 말이 있다. 자산시장도 마찬가지다. 과거와 똑같은 일이 그대로 되풀이되지는 않지만, 사람들의 행동은 놀라울 만큼 비슷한 방식으로 반복된다. 그래서 우리는 과거를 통해 배울 수 있다. 만약 배우지 못한다면, 결국 같은 실수를 다른 모습으로 다시 겪게 될 뿐이다. 과거로부터 배우는 방법은 다양하지만, 그중에서도 가장 단순하면서도 강력한 기준이 있다. 바로 기대값이다.</p>
<p>세상에는 수많은 거래와 선택이 존재한다. 그리고 그 대부분은 기대값이라는 기준으로 나눌 수 있다. 내가 낸 돈보다 훨씬 적게 돌아오는 경우, 내가 낸 돈과 비슷하게 돌아오는 경우, 그리고 내가 낸 돈보다 더 많이 돌아오는 경우다. 이 세 가지를 구분할 수만 있어도, 우리는 많은 선택에서 실수를 줄일 수 있다.</p>
<p>먼저 내가 낸 돈보다 훨씬 적게 돌아오는 경우다. 대표적인 예시는 보험과 복권이다. 이 둘은 겉으로 보기에는 완전히 다른 상품처럼 보인다. 보험은 위험에 대비한다는 성격이라면 복권은 운에 기대어 한 방을 노리는 것 처럼 보이기 때문이다. 하지만 기본적인 구조는 거의 동일하다. 많은 사람들로부터 돈을 모은 뒤, 그중 일부만을 다시 고객에게 돌려준다. 복권의 경우 1,000원을 내고 복권을 사면, 전체적으로 보면 약 절반 정도만 당첨금으로 돌아간다. 나머지는 운영 비용과 이익으로 빠져나간다. 결국 장기적으로 보면, 복권을 계속 구매하는 사람은 기대값상 손해를 보는 구조다.</p>
<p>보험도 본질적으로는 같은 구조를 지닌다. 보험회사는 가입자들로부터 보험료를 받고, 사고가 발생한 일부에게만 보험금을 지급한다. 물론 보험은 복권과 달리 중요한 기능이 있다. 사고가 발생했을 때 그 손실이 개인이 감당할 수 없는 수준이라면, 보험은 매우 유용한 수단이 될 수 있다. 하지만 문제는 많은 보험 상품이 필요 이상의 보장을 포함하거나, 장기적으로 과도한 비용을 요구하는 구조라는 점이다. 결국 많은 경우, 보험 역시 장기적으로는 원금을 꾸준히 갉아먹는 방향으로 작동한다. 게다가 보험금을 받기 위해서는 복잡한 절차와 서류 준비가 필요하다. 돈을 낼 때는 간단하지만, 돌려받을 때는 어렵다는 점도 우리가 받을 수 있는 기대값을 낮추는 중요한 요인이다.</p>
<p>두 번째는 내가 낸 돈과 비슷하게 돌아오는 경우다. 흔히 말하는 돈 먹고 돈 먹기 구조다. 겉으로 보기에는 공정한 거래처럼 보이지만, 실제로는 중간에 수수료나 비용이 존재하기 때문에 기대값은 결국 0에 가깝거나 그보다 낮아진다. 대표적인 예로 도박을 들 수 있다. 카지노 게임은 규칙상 공정해 보이지만, 실제로는 항상 카지노가 유리한 구조로 설계되어 있다. 플레이어는 단기적으로 이길 수 있지만, 장기적으로는 손해를 볼 수밖에 없다.</p>
<p>환율 거래나 단기 매매도 비슷한 성격을 가진다. 누군가는 환차익으로 돈을 벌었다고 이야기하지만, 그 이면에는 수많은 거래 비용과 타이밍의 문제가 존재한다. 주식의 단타 매매 역시 마찬가지다. 누군가는 단기간에 큰 수익을 올렸다고 말하지만, 그 과정에서 발생하는 수수료와 세금, 그리고 실패 확률을 고려하면 기대값은 생각보다 높지 않다. 특히 이런 영역은 앞서 말한 심리, 즉 나는 다를 것이라는 믿음에 기반하는 경우가 많다. 하지만 시장은 그렇게 쉽게 이길 수 있는 구조가 아니다.</p>
<p>마지막으로 우리가 집중해야 할 영역은 내가 낸 돈보다 더 많이 돌려받을 수 있는 경우다. 이 영역이 바로 투자다. 예적금, 채권, 부동산, 주식 등이 여기에 해당한다. 이들은 시간이 지남에 따라 가치를 만들어내거나, 생산성을 기반으로 수익을 창출하는 구조를 가지고 있다.</p>
<p>하지만 여기서 한 가지 중요한 점을 짚고 넘어가야 한다. 한국인 87퍼센트에 해당하는 많은 사람들이 선호하는 예금과 적금에는 큰 한계가 있다는 점이다. 이 방식이 구조적으로 물가 상승률을 따라가기 어렵기 때문이다. 예금 이자는 붙지만, 동시에 물가도 오른다. 게다가 이자에도 세금이 부과된다. 결과적으로 실질적인 구매력은 늘어나는 게 아니라 오히려 감소한다. 숫자는 늘어나지만, 실제로는 돈이 줄고 있다.</p>
<p>아래 그래프를 한 번 살펴보자. 아래의 그래프는 2005년에 100만 원이 있다고 가정하고 이를 예금에 예치했을 때의 원금 변화와 맥도날드의 대표 메뉴인 빅맥의 가격을 나타낸 그래프이다. 빅맥은 그 나라의 물가를 나타내는 지표로 종종 사용된다. 파란색 네모로 표시된 선은 예금 자산의 증가를 나타낸다. 빨간색 동그라미로 표시된 선은 빅맥 가격의 변화를 나타낸다. 꾸준히 증가하는 예금 자산에 비해 등락은 있지만 같은 기간 동안 빅맥 가격이 더 빠른 속도로 상승하고 있다. 초록색 세모로 표시된 선은, 당시 예금 자산으로 살 수 있는 빅맥의 개수, 즉 실질 구매력을 보여준다.</p>
<p>우리는 이 실질 구매력을 나타내는 초록색 세모 그래프에 주목해야 한다. 초반에는 예금으로 400개가 넘는 빅맥을 살 수 있었지만, 시간이 지날수록 그 수치는 점점 감소한다. 예금 잔액은 늘어나고 있는데도, 그 돈으로 살 수 있는 빅맥의 개수가 줄어드는 것이다. 그 이유는 2006년 대비 20년이 지났을 때 예금 자산이 100만 원에서 180만 원까지 약 80퍼센트 불어났지만, 빅맥 가격은 약 2400원에서 5500원으로 두 배 이상이 늘어났기 때문이다. 이것이 그저 단순히 돈의 양이 아니라 실질 구매력에 주목해야 하는 이유다.</p>
<figure class="book-figure"><img src="plots/1.6_bigmac_index.png" alt="빅맥지수와 구매력 비교" loading="lazy"><figcaption>빅맥지수와 구매력 비교</figcaption></figure>
<p>채권은 국가나 기업이 돈을 빌리면서 이자를 지급하는 구조다. 비교적 안정적인 수익을 제공하지만, 역시 수익률은 제한적이다. 금리가 낮은 환경에서는 채권 역시 물가 상승률을 충분히 따라가지 못하는 경우가 많다. 결국 남는 것은 부동산과 주식이다. 이 두 자산은 장기적으로 경제 성장과 함께 가치가 상승해왔다. 한국의 경우를 보더라도, 지난 시간 동안 주요 부동산 가격은 몇 배 이상 상승해왔다. 주식 시장 역시 마찬가지다. 변동성은 크지만, 장기적으로 보면 꾸준히 우상향하는 흐름을 보여왔다. 이는 단순한 투기가 아니라, 경제의 성장과 기업의 이익이 반영된 결과다.</p>
<p>이제 선택은 단순해진다. 우리는 어떤 영역에 계속 머물 것인가를 결정해야 한다. 기대값이 낮은 곳에서 반복적으로 돈을 잃을 것인지, 기대값이 없는 곳에서 시간과 에너지를 소비할 것인지, 아니면 기대값이 높은 곳에서 꾸준히 시간을 쌓아갈 것인지 말이다. 투자의 본질은 복잡하지 않다. 어디에 돈을 넣어야 하는지가 아니라, 어떤 구조를 선택하느냐의 문제다. 기대값이 낮은 구조를 반복하면 결국 손실로 귀결되고, 기대값이 높은 구조를 반복하면 돈이 돈을 낳는 복리의 힘을 볼 수 있다.</p>
<p>그러니 우리는 지금 어떤 구조 속에 있는지 끊임없이 질문해야 한다.</p>
<h2 id="1-7-1장을-정리하며">1.7 1장을 정리하며</h2>
<p>투자를 이야기하면 대부분은 무엇을 살지부터 고민한다. 어떤 종목이 좋은지, 어떤 타이밍에 들어가야 하는지, 어떤 전략이 수익률이 높은지에 관심을 가진다. 하지만 그보다 먼저 생각해야 할 것이 있다. 바로 사람이다. 그리고 더 정확히 말하면, 나 자신이다. 이 장에서 우리는 투자 기술이 아니라 인간의 심리에 대해 먼저 이야기했다. 이유는 단순하다. 심리를 이해하지 못한 상태에서 어떤 전략을 배우더라도, 결국 같은 방식으로 무너질 가능성이 높기 때문이다. 이제 이 장에서 다룬 인간의 심리에 대해 짧게 정리해보자.</p>
<p>사람이 많은 곳에는 분명 이유가 있다. 하지만 그 이유가 곧 기회라는 뜻은 아니다. 오히려 많은 사람이 몰려 있다는 사실 자체가 이미 늦었음을 의미할 때가 더 많다. 군중을 따라가는 순간, 우리는 스스로 판단을 멈추고 평균으로 돌아가게 된다. 만약 군중 속에 답이 있다면, 왜 부자는 소수에 불과할까.</p>
<p>비교심리도 마찬가지다. 우리는 끊임없이 남과 비교하며 스스로를 평가한다. 하지만 비교는 득보다 실이 많다. 팃포텟이 주는 교훈처럼 옆 사람이 아니라 전체를 보고, 당장의 손해를 감수하더라도 마지막에 웃는 선택을 해야 한다.</p>
<p>우리는 종종 돈에 불필요한 의미를 부여한다. 힘들게 번 돈, 쉽게 번 돈, 운 좋게 생긴 돈. 하지만 돈은 그저 돈일 뿐이다. 돈의 출처가 아니라, 그 돈을 어떻게 다루는지가 더 중요하다. 이 단순한 기준 하나만으로도 많은 비합리적인 선택을 줄일 수 있다.</p>
<p>또한 우리는 스스로가 다를 것이라고 생각한다. 다른 사람은 실패했지만, 나는 아닐 것이라고 믿는다. 하지만 역사 속 수많은 사례는 그 생각이 얼마나 위험한지 보여준다. 가장 뛰어난 지성을 가진 사람들조차 이 함정에서 벗어나지 못했다.</p>
<p>손실에 대한 두려움을 이겨내야 한다. 우리는 이익보다 손실을 훨씬 더 크게 느낀다. 이 감정은 우리의 판단을 왜곡시키고, 작은 손실은 피하려다 더 큰 이익을 놓치게 만든다. 이는 본능적으로는 자연스럽지만, 투자에서는 치명적인 약점이 된다.</p>
<p>기대값이라는 기준을 가지고 멀리 봐야 한다. 단기적인 결과를 바라는 일은 투자가 아니라 투기다. 기대값이 높은 선택을 반복하여 복리의 마법을 좇는 것이 우리가 할 일이다.</p>
<p>결국 이 장에서 투자는 기술의 문제가 아니라, 판단의 문제라고 이야기했다. 그리고 그 판단은 결국 인간의 심리 위에서 이루어진다. 아무리 좋은 전략을 알아도, 군중을 따라가고, 비교에 흔들리고, 감정에 끌린다면 그 전략은 제대로 작동하지 않는다. 반대로 심리를 이해하고, 스스로를 통제할 수 있다면 복잡한 전략이 없어도 충분히 좋은 결과를 만들어낼 수 있다.</p>
<p>그래서 우리는 순서를 바꿔야 한다. 무엇을 살지 고민하기 전에, 어떻게 생각할지를 먼저 정해야 한다. 이제 여러분이 어느 정도 마음의 준비를 마쳤기를 바란다. 다음 장에서는 돈이 어떻게 움직이는지, 그리고 왜 특정 자산이 장기적으로 상승하는지에 대해 이야기할 것이다. 심리를 이해했다면, 이제는 투자에 앞서 돈의 구조를 이해할 차례다.</p>
<h1 id="제2장-돈을-이해해야-게임이-보인다">💰 제2장. 돈을 이해해야 게임이 보인다</h1>
<h2 id="2-1-돈은-계속-풀린다">2.1 돈은 계속 풀린다</h2>
<p>이전 장에서 우리는 하나의 중요한 사실을 확인했다. 빅맥 가격은 꾸준히 올라갔고, 같은 기간 동안 예금은 늘어났음에도 불구하고 실제로 살 수 있는 빅맥의 개수는 오히려 줄어들었다. 숫자는 증가했지만, 실질적인 구매력은 감소한 것이다. 그렇다면 질문이 하나 생긴다. 왜 이런 일이 발생할까. 왜 우리는 돈을 모으고 있음에도 점점 가난해지는 느낌을 받게 되는 걸까. 이 질문에 답하기 위해서는 돈이 어떻게 만들어지고, 어떻게 퍼져나가는지를 이해해야 한다.</p>
<p>필립 바구스의 ≪왜 그들만 부자가 되는가≫라는 책에서는 금광에 대한 이야기가 등장한다. 금이 화폐 역할을 하던 시대를 상상해 보자. 금광을 가진 사람은 단순히 자원을 가진 것이 아니라, 돈을 만들어낼 수 있는 권한을 가진 것이나 다름없었다. 금을 캐낼 수 있다는 것은 곧 새로운 화폐를 공급할 수 있다는 의미였기 때문이다.</p>
<p>하지만 여기서 더 중요한 점은 단순히 금광을 소유한 사람뿐 아니라, 금을 막 캐낸 사람, 즉 그 금을 가장 먼저 사용하는 사람이 큰 이익을 얻는다는 사실이다. 처음 채굴된 금은 아직 시장에 충분히 퍼지지 않은 상태다. 이때 그 금을 손에 쥔 사람은 기존 가격으로 물건을 살 수 있다. 즉, 물가는 아직 오르지 않았지만 돈은 이미 늘어난 상태다. 이 시점에서 소비를 한 사람은 더 많은 가치를 가져갈 수 있다.</p>
<p>그다음 단계에서는 그 금을 받은 사람들, 즉 1차 수혜자들이 등장한다. 이들도 아직 크게 오른 물가를 체감하기 전이기 때문에 유리한 조건에서 거래를 한다. 이후 2차, 3차로 금이 퍼지면서 점점 시장 전반에 영향을 미치고, 결국 물가가 상승하게 된다. 그리고 이 시점부터는 더 이상 새로운 금으로 인한 추가적인 이득을 기대하기 어려워진다. 재화나 서비스의 양은 그대로인데, 돈의 양만 늘어났기 때문에 가격이 오를 수밖에 없다.</p>
<p>돈도 마찬가지로 동시에, 공평하게 퍼지지 않는다. 먼저 받은 사람과 나중에 받은 사람 사이에는 분명한 차이가 생긴다. 그리고 그 차이가 결국 부의 격차로 이어진다. 이 과정이 바로 ‘칸티용 효과’다.</p>
<p>이제 이 구조를 현대 사회로 가져와 보자. 오늘날 금광의 역할은 중앙은행이 대신한다. 중앙은행은 필요에 따라 돈을 만들어내고, 그 돈은 시중은행을 통해 시장으로 흘러간다. 하지만 이 돈 역시 모든 사람에게 동시에 전달되지 않는다. 가장 먼저 돈을 접하는 곳은 은행과 기업, 그리고 자산시장이다. 기업은 투자와 확장을 위해 자금을 사용하고, 투자자들은 주식과 부동산을 매입한다. 이 과정에서 자산 가격은 먼저 상승한다. 그 후 시간이 지나면서 그 영향이 소비 시장으로 퍼지고, 우리가 체감하는 물가 상승으로 이어진다.</p>
<p>여기서 중요한 점은 우리가 월급으로 돈을 받는 시점이 이 흐름의 가장 마지막에 가깝다는 것이다. 이미 자산 가격이 오르고, 물가가 상승한 이후에야 우리는 돈을 받는다. 하지만 그 새로 찍은 돈의 혜택은 이미 먼저 돈을 접한 사람들이 상당 부분 가져간 뒤다. 그래서 우리는 같은 돈을 가지고도 이전보다 더 적은 것을 살 수 있게 된다. 그 결과 통장 잔고는 조금 늘어났을지언정, 삶은 오히려 더 팍팍해졌다고 느끼게 되는 것이다.</p>
<p>이전 장에서 본 빅맥 사례는 바로 이 구조를 보여준다. 예금은 꾸준히 증가했지만, 빅맥 가격은 더 빠르게 상승했고, 그 결과 우리가 실제로 살 수 있는 양은 줄어들었다. 이것은 단순한 물가 상승의 문제가 아니라, 돈이 퍼지는 순서의 문제다.</p>
<p>그렇다면 우리는 어떻게 해야 할까. 많은 사람들이 이 지점에서 감정적으로 반응한다. 왜 이런 구조가 존재하는지, 왜 나는 항상 뒤에 있는지에 대해 불만을 느낀다. 하지만 이 감정은 큰 도움이 되지 않는다. 왜냐하면 이 구조는 개인이 바꿀 수 있는 것이 아니기 때문이다. 이것은 사회가 선택한 시스템이고, 국가가 운영하는 게임의 규칙이다.</p>
<p>우리가 할 수 있는 일은 단 하나다. 이 게임의 룰을 이해하고, 그 안에서 움직이는 것이다. 단순히 돈을 모으는 것만으로는 부족하다. 돈이 어디에서 만들어지고, 어디로 먼저 흘러가는지를 이해해야 한다. 그리고 그 흐름 속에서 가능한 한 앞쪽에 서야 한다. 가만히 월급이 들어오기만을 기다린다면, 우리는 항상 마지막에 서게 된다. 그리고 그때는 이미 대부분의 기회가 지나간 뒤다.</p>
<p>인플레이션은 단순한 경제 현상이 아니다. 그것은 보이지 않게 작동하는 구조이며, 우리가 살아가는 게임의 룰이다. 이 룰을 이해하지 못하면, 우리는 열심히 일하면서도 점점 뒤처지게 된다. 반대로 이 룰을 이해하면, 왜 어떤 자산은 계속 오르는지, 왜 어떤 사람들은 점점 더 부자가 되는지 자연스럽게 보이기 시작한다.</p>
<p>결국 결론은 단순하다. 돈을 모으는 것만으로는 부족하고, 돈이 먼저 흐르는 곳으로 이동해야 한다. 그것이 이 게임에서 살아남는 방법이다.</p>
<h2 id="2-2-금리란-무엇인가">2.2 금리란 무엇인가</h2>
<p>금리는 돈을 빌리는 데 드는 비용이다. 돈을 빌릴 때는 이자를 지불하는데, 이때 적용되는 비율이 바로 금리다. 하지만 금리는 모두에게 똑같이 적용되지 않는다. 그리고 이러한 금리의 차이가 우리의 삶 자체를 완전히 바꿔놓을 수 있다. 그래서 금리는 단순한 숫자가 아니라, 우리의 일상생활을 결정하는 핵심 요소다.</p>
<p>사람들은 지금 당장 없는 돈을 미래의 소득을 담보로 미리 쓰기 위해서 돈을 빌린다. 집을 사기 위해, 사업을 시작하기 위해, 혹은 더 큰 기회를 잡기 위해 우리는 돈을 빌린다. 다시 말해, 금리는 단순한 비용이 아니라 시간과 기회의 교환이다. 미래의 돈을 현재로 끌어오는 대가라고 볼 수 있다.</p>
<p>이 과정이 가능하려면 한 가지 전제가 필요하다. 바로 신뢰다. 돈을 빌려주는 사람은 이 돈이 다시 돌아올 것이라고 믿어야 하고, 빌리는 사람은 미래에 그 돈을 갚을 수 있다고 믿어야 한다. 현대 자본주의 시스템은 바로 이 신뢰 위에 쌓여 있다. 은행이 돈을 빌려주고, 기업이 투자하고, 개인이 대출을 받는 모든 과정은 결국 서로에 대한 신뢰가 전제되어야만 작동한다.</p>
<p>그래서 금리는 단순한 숫자가 아니라, 신뢰의 가격이기도 하다. 누군가를 더 신뢰할수록 낮은 금리를 적용하고, 신뢰가 낮을수록 더 높은 금리를 요구한다. 이 점을 이해하면, 왜 같은 돈을 빌리더라도 누구는 싸게, 누구는 비싸게 빌리게 되는지 자연스럽게 이해할 수 있다.</p>
<p>그렇다면 이 금리는 어떻게 결정될까. 기본적으로 각 나라의 중앙은행이 정하는 기준금리가 있고, 여기에 가산금리가 붙는다. 기준금리는 말 그대로 금융 시장의 기준이 되는 금리다. 하지만 실제로 우리가 대출을 받을 때 적용되는 금리는 이 기준금리 그대로가 아니다. 은행은 여기에 각 개인이나 기업의 상황에 따라 여러 요소를 반영해 금리를 조정한다. 이때 붙는 것이 가산금리다.</p>
<p>가산금리는 신용도에 따라 크게 달라진다. 신용도가 높은 사람이나 기업은 낮은 가산금리를 적용받는다. 돈을 빌려줘도 떼일 가능성이 낮기 때문이다. 반대로 개인, 특히 신용도가 낮거나 소득이 불안정한 경우에는 높은 가산금리가 붙는다. 같은 돈을 빌리더라도 누구는 3퍼센트로 빌리고, 누구는 7퍼센트, 10퍼센트에 가깝게 빌리는 일이 벌어지는 이유다.</p>
<p>이 구조는 단순한 차이를 넘어 결과의 격차를 만든다. 금리가 낮은 사람은 돈을 빌려 더 많은 기회를 잡을 수 있고, 금리가 높은 사람은 같은 기회를 잡더라도 훨씬 더 큰 비용을 감당해야 한다. 시간이 지나면 이 차이는 점점 더 벌어진다. 금리는 단순한 비용이 아니라, 부의 흐름을 결정짓는 중요한 장치다. 은행과 기관은 여기서도 가장 먼저 돈을 접하는 위치에 있다. 낮은 금리로 자금을 조달하고, 그 자금을 바탕으로 더 큰 자산에 투자한다. 반면 개인은 이 구조의 뒤쪽에 있다. 더 높은 금리로 돈을 빌리고, 이미 가격이 오른 자산에 접근하게 된다. 같은 시장에서 움직이고 있지만, 출발선 자체가 다르다.</p>
<p>그래서 금리는 중립적인 숫자가 아니다. 겉으로는 누구에게나 동일하게 적용되는 것처럼 보이지만, 실제로는 자산이 많은 사람과 기관에 훨씬 유리하게 작동한다. 돈을 싸게 빌릴 수 있는 사람은 더 많은 기회를 얻고, 비싸게 빌릴 수밖에 없는 사람은 그만큼 불리한 조건에서 시작하게 된다. 이 사실이 불공평하게 느껴질 수도 있다. 하지만 앞서 이야기했듯이, 이 시스템은 개인이 바꿀 수 있는 것이 아니다. 우리가 할 수 있는 일은 하나뿐이다. 이 구조를 이해하고, 그 안에서 유리한 위치를 찾는 것이다.</p>
<p>금리에 대해서는 한 가지 더 중요한 기능이 있다. 금리는 단순히 돈의 가격을 결정하는 것을 넘어, 시장에 풀리는 돈의 양, 즉 통화량을 조절하는 역할을 한다. 앞서 금광의 예를 통해 살펴봤듯이, 금이 시장에 많이 공급되면 물가가 상승한다. 금과 마찬가지로 현대 사회에서도 통화량이 증가하면 물가는 상승한다. 돈이 많아질수록 같은 물건을 사기 위해 더 많은 돈이 필요해지기 때문이다.</p>
<p>이제 금리가 이 과정에 어떻게 영향을 미치는지 생각해 보자. 당신이 돈을 활용해 연 10퍼센트의 수익을 낼 수 있는 사람이라고 가정해 보자. 만약 금리가 낮아 2퍼센트에 돈을 빌릴 수 있다면 어떨까. 단순 계산으로도 8퍼센트의 차익이 남는다. 이 경우 가능한 한 많은 돈을 빌려 사업을 확장하는 것이 합리적인 선택이 된다. 실제로 시장에서도 이런 상황이 벌어진다. 금리가 낮아지면 기업과 개인은 더 많은 돈을 빌리고, 그 돈은 투자와 소비로 이어지며 시장에 더 많이 풀리게 된다.</p>
<p>반대로 금리가 올라가면 상황은 달라진다. 같은 사람이 6퍼센트의 금리로 돈을 빌려야 한다면, 기대 수익과의 차이는 4퍼센트로 줄어든다. 여기에 인건비나 기타 비용까지 고려하면 사업 자체가 성립하지 않을 수도 있다. 이 경우 사람들은 돈을 덜 빌리게 되고, 기존에 빌린 돈도 줄이려고 한다. 결국 시장에 풀리던 돈이 다시 은행으로 돌아가게 된다. 이 과정이 반복되면서 시장의 통화량은 자연스럽게 조절된다. 금리가 낮을 때는 돈이 풀리고, 금리가 높을 때는 돈이 회수된다. 그리고 이 통화량의 변화는 결국 물가에 영향을 미친다. 정확히 말하면, 통화량의 증가 속도가 빨라지면 물가 상승이 가속화되고, 증가 속도가 둔화되면 물가 상승도 함께 둔화된다.</p>
<p>일부 사람들은 돈을 더 이상 만들지 않으면 이러한 불평등이 사라지지 않을까 생각할 수도 있다. 하지만 자본주의 시스템에서는 인플레이션을 막는 것이 거의 불가능하다는 점이다. 그 이유는 이자 구조 때문이다. 누군가 100만 원을 빌리면, 100만 원에 이자를 쳐서 갚아야 한다. 하지만 시장 전체로 보면 처음에 존재했던 돈은 100만 원뿐이다. 이 차이를 메우기 위해서는 결국 추가적인 돈이 계속해서 공급되어야 한다. 반대로 이자가 없다면 누가 돈을 빌려주려 하겠는가. 즉, 자본주의는 구조적으로 통화량의 증가를 필요로 하고, 그 결과로 인플레이션을 동반할 수밖에 없다.</p>
<p>결국 자본주의는 태생적으로 불평등을 안고 있다. 그리고 그 중심에는 금리가 있다. 이 구조를 이해하느냐, 이해하지 못하느냐에 따라 결과는 완전히 달라진다.</p>
<h2 id="2-3-빈익빈-부익부">2.3 빈익빈 부익부</h2>
<p>앞선 글에서 우리는 인플레이션과 금리가 어떻게 작동하는지 살펴봤다. 돈은 동시에 공평하게 퍼지지 않고, 먼저 접근한 사람에게 유리하게 작동한다. 금리는 신뢰의 가격으로 작용하며, 낮은 금리를 적용받는 사람일수록 더 많은 기회를 잡을 수 있다. 이 두 가지 구조가 결합되면 어떤 일이 벌어질까. 이미 유리한 위치에 있는 사람은 더 빠르게 자산을 늘릴 수 있고, 그렇지 못한 사람은 점점 뒤처지는, 소위 말해 &#39;빈익빈 부익부&#39; 현상이 발생한다. 그렇다면 실제로 이러한 현상이 발생하고 있는지 데이터를 통해 확인해볼 필요가 있다.</p>
<p>불평등의 정도를 측정하는 방법은 여러 가지가 있다. 우리가 흔히 접하는 방식은 상위 몇 퍼센트가 전체 자산의 몇 퍼센트를 차지하고 있는지를 보는 것이다. 예를 들어 상위 1퍼센트가 전체 자산의 절반을 가지고 있다면, 그 사회는 상당히 불평등하다고 판단할 수 있다. 보다 객관적인 지표로는 지니계수가 있다. 지니계수는 소득이나 자산이 얼마나 고르게 분배되어 있는지를 나타내는 지표로, 0에 가까울수록 평등하고 1에 가까울수록 불평등한 상태를 의미한다. 다만 지니계수는 계산 방식이 복잡하고, 장기간의 데이터를 확보하기 어려운 경우가 많기 때문에 이번 글에서는 보다 직관적인 상위 1퍼센트의 소득과 자산 점유율을 중심으로 살펴보려 한다.</p>
<p>아래의 두 그래프는 주요 국가들의 소득 상위 1퍼센트 점유율과 자산 상위 1퍼센트 점유율을 보여준다. World Inequality Database의 데이터를 기반으로 구성한 이 그래프를 보면 한 가지 공통된 흐름이 보인다. 대부분의 국가에서 상위 1퍼센트의 점유율이 시간이 지날수록 증가하는 우상향을 그리고 있다는 점이다. 이는 단순한 일시적 현상이 아니라, 장기적으로 불평등이 확대되고 있다는 명확한 증거다. 즉, 부자는 더 많은 비중을 차지하게 되고, 그 외의 사람들은 상대적으로 점점 더 적은 몫을 가지게 된다.</p>
<figure class="book-figure"><img src="plots/2.3.1_wid_inequality_trends_IncomeTop1.png" alt="상위 1% 소득 비중 추이" loading="lazy"><figcaption>상위 1% 소득 비중 추이</figcaption></figure>
<figure class="book-figure"><img src="plots/2.3.1_wid_inequality_trends.png" alt="소득과 부의 불평등 추이" loading="lazy"><figcaption>소득과 부의 불평등 추이</figcaption></figure>
<p>여기서 한 가지 더 중요한 지표를 살펴볼 필요가 있다. 바로 1인당 GDP다. 1인당 GDP는 단순한 경제 규모가 아니라, 한 사람이 평균적으로 어느 정도의 경제적 수준을 누리고 있는지를 보여주는 지표다. 다시 말해, 우리가 실제로 체감하는 삶의 수준과 가장 밀접하게 연결된 수치다. 아래의 그래프는 주요 국가들의 1인당 GDP 추이를 나타낸다. 이 그래프에서 중요한 것은 단순한 절대적인 수치가 아니라 상승 속도다. 경제가 얼마나 빠르게 성장하고 있는지를 보여주기 때문이다.</p>
<figure class="book-figure"><img src="plots/2.3.2_wid_per_capita_gdp.png" alt="1인당 GDP 흐름" loading="lazy"><figcaption>1인당 GDP 흐름</figcaption></figure>
<p>이를 더 명확하게 보기 위해 미국을 기준으로 비교한 것이 아래의 그래프다. 미국을 1로 놓고 각 국가가 어느 수준에 있는지를 나타낸 것이다. 이 그래프를 보면 몇 가지 중요한 사실을 확인할 수 있다. 한국과 같은 국가는 빠른 속도로 성장하며 미국과의 격차를 줄여왔지만, 2010년 이후부터는 그 속도가 눈에 띄게 둔화되고 있다. 반면 대부분의 선진국들은 이미 1990년대부터 미국 대비 상대적인 비율이 감소하는 흐름을 보인다. 즉, 절대적으로는 성장하고 있지만, 상대적으로는 미국과의 격차가 벌어지고 있는 것이다.</p>
<figure class="book-figure"><img src="plots/2.3.3_wid_gdp_per_capita_relative_to_us.png" alt="미국 대비 1인당 GDP 비교" loading="lazy"><figcaption>미국 대비 1인당 GDP 비교</figcaption></figure>
<p>여기서 눈에 띄는 국가는 중국이다. 중국은 여전히 미국 대비 빠른 상승 흐름을 보이고 있다. 이는 제조업 중심의 성장, 국가 주도의 투자 확대, 그리고 글로벌 자본과 노동력의 결합이 만들어낸 결과다. 저렴한 노동력을 바탕으로 세계의 공장 역할을 수행했고, 이를 통해 축적된 자본을 다시 인프라와 산업에 재투자하는 구조가 빠른 성장을 만들어냈다. 하지만 이러한 모습은 과거에도 한 번 등장한 적이 있다. 소련이 급격히 성장하던 시기, 많은 학자들조차 소련식 계획경제가 자본주의보다 더 효율적이고 우월한 체제라고 믿었다. 실제로 일정 기간 동안은 놀라운 성장 속도를 보여주기도 했다. 하지만 그 결과는 우리가 알고 있듯이 붕괴였다.</p>
<p>중국 역시 지금은 빠른 성장의 한가운데에 있지만, 이 흐름이 장기적으로 지속될 수 있을지는 여전히 논쟁의 대상이다. 이 문제를 조금 더 깊이 있게 이해하고 싶다면, 대런 애쓰모글루의 ≪국가는 왜 실패하는가≫를 참고할 수 있다. 이 책에서는 국가의 성장을 결정짓는 핵심 요소로 ‘포용적 제도(Inclusive Institutions)’와 ‘착취적 제도(Extractive Institutions)’를 제시한다. 포용적 제도는 개인의 권리와 창의를 보호하며 지속적인 성장을 가능하게 하지만, 착취적 제도는 특정 집단이 권력을 독점하며 장기적으로 성장을 제한한다고 설명한다.</p>
<p>반대로 위엔위엔 앙의 ≪부패한 중국은 왜 성장하는가≫는 조금 다른 시각을 제시한다. 이 책은 중국의 성장 과정에서 나타난 부패가 단순히 비효율을 낳는 것이 아니라, 오히려 경제 활동을 촉진하는 역할을 했다는 점을 강조한다. 즉, 동일한 현상을 두고도 전혀 다른 해석이 가능하다는 것이다. 이처럼 중국의 성장에 대해서는 학자들 사이에서도 의견이 크게 갈린다. 그렇기 때문에 이 문제에 관심이 있다면 한쪽 시각에만 치우치기보다는, 다양한 자료를 통해 균형 잡힌 시각을 갖는 것이 중요하다.</p>
<p>다시 본론으로 돌아가서 방금 살펴본 미국 대비 1인당 GDP의 그래프를 통해 우리는 한 가지 중요한 사실을 알 수 있다. 부익부 빈익빈은 단순히 개인의 문제나 한 사회 내부의 문제가 아니라, 국가 간에도 동일하게 발생하고 있다는 점이다. 그리고 그 중심에는 우리가 앞서 살펴본 구조가 자리 잡고 있다. 세계 경제는 사실상 달러를 중심으로 돌아간다. 미국의 통화 정책, 특히 금리 정책은 전 세계에 영향을 미친다. 미국이 금리를 낮추면 글로벌 자본은 더 많은 수익을 찾아 움직이고, 금리를 올리면 다시 미국으로 자본이 돌아온다. 이러한 흐름 속에서 자본은 자연스럽게 더 강한 시장, 더 많은 기회를 제공하는 곳으로 이동하게 된다.</p>
<p>우리는 데이터를 통해 국가도, 그리고 세계 경찰을 자처했던 미국도, 그 어느 누구도 빈자의 편에 서 있지 않다는 사실을 확인했다. 가만히 있으면 자연스럽게 뒤처지는 구조라는 점이다. 이 구조 속에서는 가만히 앉아 있는 것 자체가 뒤처지는 선택이 된다. 그렇다면 결론은 명백하다. 가능한 한 빨리, 그리고 의식적으로 자본이 흐르는 방향에 올라타야 한다. 즉, 어떻게든 자본주의의 혜택을 받을 수 있는 방향으로 하루라도 빨리 움직여야 한다.</p>
<h2 id="2-4-돈이-흐르는-곳에-올라타라">2.4 돈이 흐르는 곳에 올라타라</h2>
<p>앞선 글에서 우리는 한 가지 중요한 사실을 확인했다. 자본주의라는 시스템 속에서 돈은 공평하게 퍼지지 않는다는 점이다. 돈은 항상 먼저 접근할 수 있는 곳으로 흘러가고, 그 흐름 속에 있는 사람과 그렇지 못한 사람 사이에는 시간이 지날수록 격차가 벌어진다. 월급을 받는 대부분의 사람들은 이 구조에서 뒤쪽에 위치한다. 돈이 풀릴 때 가장 마지막에 받는 위치에 있기 때문이다. 그 사이에 자산 가격은 이미 올라 있고, 우리는 더 비싼 가격으로 그 결과를 따라가게 된다. 이러한 현상은 한 사회 안에서만 일어나는 것이 아니다. 국가 간에도 동일하게 발생한다. 자본은 더 강한 시장, 더 높은 수익을 기대할 수 있는 곳으로 이동한다. 그리고 그 중심에는 항상 기업과 금융 시스템이 있다.</p>
<p>여기서 질문을 하나 던져보자. 그렇다면 이 구조 속에서 우리는 어떻게 해야 할까. 답은 의외로 단순하다. 자본이 흐르는 곳에 올라타면 된다. 돈이 풀리면 가장 먼저 가는 곳은 은행과 기업이다. 그리고 이 기업들은 가장 낮은 금리로 돈을 조달할 수 있는 위치에 있다. 다시 말해, 자본주의 시스템에서 가장 유리한 위치는 부가가치를 창출해 내는 기업이다.</p>
<p>아, 물론 돈을 찍어내는 국가는 예외로 하자. 참고로, 정확히 말하자면 돈을 찍어내는 건 중앙은행이다. 중앙은행은 국채를 매입하거나 시중은행에 자금을 공급하는 방식으로 새로운 돈을 만들어낸다. 예를 들어 정부가 국채를 발행하면 중앙은행이 이를 사들이고, 그 대가로 새로운 돈이 시장에 공급된다. 또는 시중은행에 돈을 빌려주면서 유동성을 늘리기도 한다. 이렇게 만들어진 돈은 개인에게 바로 가지 않는다. 먼저 금융 시스템을 통해 은행과 기업으로 흘러가고, 이후에야 시장 전체로 퍼진다.</p>
<p>이를 고려한다면 우리에게 선택지는 두 가지가 있다. 직접 회사를 운영하거나 회사의 일부를 소유해야 한다. 대부분의 사람들에게 전자는 현실적으로 어렵다. 하지만 후자는 쉽게 가능하다. 그리고 그 수단이 바로 주식이다. 주식은 단순히 가격이 오르고 내리는 종이가 아니다. 주식은 기업의 지분이다. 즉, 기업의 일부를 소유하는 권리다. 기업이 성장하면 그 이익은 결국 주주에게 돌아온다.</p>
<p>주식이 처음 등장한 것도 이러한 필요 때문이었다. 17세기 네덜란드에서 설립된 동인도회사는 대규모 무역을 위해 막대한 자금이 필요했다. 개인이 감당하기 어려운 규모였기 때문에, 여러 사람에게 자금을 나누어 받고 그 대가로 지분을 나누어주었다. 이것이 현대 주식 시장의 시작이다. 즉, 주식은 처음부터 ‘자본의 흐름에 일반인이 참여할 수 있게 만든 장치’였다.</p>
<p>지금까지의 내용을 잘 따라왔다면, 자본주의 시스템에서 부를 만들기 위해서는, 단순히 돈을 모으는 것이 아니라 기업의 성장에 참여해야 한다는 점을 알 수 있다. 그렇다면 어떤 기업에 투자해야 할까. 개별 기업을 고르기 전에, 먼저 국가 단위에서 큰 흐름을 보는 것이 중요하다. 앞선 글에서 우리는 주요 국가들의 성장 데이터를 살펴봤다.</p>
<p>대부분의 선진국들은 일정 수준까지 성장한 이후에는 성장 속도가 확연히 둔화되는 경향을 보였다. 이미 충분히 산업이 발달했고, 인구 구조나 생산성 측면에서도 여러 한계에 부딪혔기 때문이다. 혁신이 정체되거나, 새로운 성장 동력이 부족해지는 경우도 많다. 그에 비해 미국은 이러한 한계를 극복하고 여전히 꾸준한 성장세를 유지하고 있다. 이는 단순히 경제 규모라기보다, 자본이 지속적으로 미국으로 흘러들어가고 있다는 신호로도 볼 수 있다. 다음 장에서 더 자세히 다루겠지만, 이 흐름의 중심에는 결국 사람이 있다. 어떤 사람이 모이고, 어떤 사람이 가치를 만들어내느냐에 따라 자본의 방향은 결정된다.</p>
<p>물론 중국 역시 빠른 성장세를 보이고 있다. 하지만 이 부분에 대해서는 조금 더 신중하게 접근할 필요가 있다. 개인적인 의견이지만, 나는 장기적으로 미국이 여전히 우위를 유지할 가능성이 높다고 본다. 과거 소련과 미국의 경쟁에서도 결국 승자는 미국이었다. 이것은 단순히 성장 추세의 문제가 아니라 제도의 문제였다. 나는 아직 중국이 충분히 포용적인 제도를 갖추지 못했다고 생각한다. 국가 주도의 강력한 지원을 통해 빠른 성장을 이루고 있지만, 이것이 장기적으로 지속 가능한 구조인지에 대해서는 의문이 남는다. 마치 스테로이드를 맞고 빠르게 성장하는 것처럼 보일 수 있다. 물론 이는 하나의 관점일 뿐이며, 다양한 의견이 존재한다. 따라서 이 부분은 참고로 받아들이는 것이 좋다.</p>
<p>결국 다시 본론으로 돌아가자. 우리가 해야 할 일은 자본이 흐르는 방향을 이해하고, 그 흐름에 올라타는 것이다. 단순히 월급을 모으는 것만으로는 부족하다. 우리는 스스로가 자본주의의 근간이라 할 수 있는 부가가치를 창출할 수 있는 기업의 일부가 되어야 한다. 그리고 가장 현실적이고 쉬운 방법은 주식을 사는 것이다.</p>
<p>조금 더 구체적으로, 그리고 장기적인 관점에서 말하자면 하나의 방향은 분명하다. 자본이 가장 강하게 흐르고 있는 곳, 미국 시장에 올라타는 것이다. 이 책의 남은 부분에서 더욱 구체적으로 어떻게 그 흐름에 올라탈 수 있는지, 그리고 어떤 방식으로 접근해야 하는지를 보다 구체적으로 다룬다.</p>
<h2 id="2-5-투자의-본질은-결국-사람이다">2.5 투자의 본질은 결국 사람이다</h2>
<p>세상에는 다양한 투자 수단이 존재한다. 부동산, 주식, 채권, 금, 원자재, 그리고 최근에는 암호화폐까지. 누군가는 땅에 투자하고, 누군가는 기업에 투자하며, 또 누군가는 기술에 투자한다. 또한 많은 사람들이 투자 대상을 분석할 때 숫자와 구조에 집중한다. 각각의 투자 대상이 가지는 수익률, 가격, 지표, 정책, 기술은 물론 중요하지만 그보다 더 중요한 요소가 있다. 그 모든 것의 중심에는 결국 사람이 있다는 점이다. 어떤 사람이 모여 있고, 어떤 방향으로 움직이고 있는지를 이해하지 못하면, 아무리 좋은 자산도 제대로 판단하기 어렵다.</p>
<p>마이크 버드의 ≪부동산은 어떻게 권력이 되었나≫는 부동산의 관점에서 이를 잘 보여준다. 이 책은 부동산이 단순한 자산을 넘어 어떻게 권력이 되었는지를 설명한다. 과거에는 토지가 생산 수단의 핵심이었다. 농사를 짓기 위해서는 땅이 필요했고, 그 땅을 소유한 사람이 자연스럽게 권력을 가지게 되었다. 시간이 지나 산업 구조는 바뀌었지만, 토지의 힘은 사라지지 않았다. 오히려 도시화와 함께 더 강력해졌다.</p>
<p>지금도 그 구조는 크게 다르지 않다. 예를 들어 상가를 하나 생각해보자. 가게 주인이 열심히 장사를 해서 매출을 올리고, 그로 인해 상권이 활성화된다. 주변에 사람이 몰리고, 지역이 살아난다. 하지만 그 결과로 가장 큰 혜택을 보는 사람은 누구일까. 바로 건물주다. 장사를 잘한 것은 가게 주인이지만, 임대료를 올릴 수 있는 권한은 건물주에게 있다. 결국 가게 주인이 만들어낸 부가가치의 일부가 부동산 소유자에게 이전되는 구조다. 부동산은 스스로 가치를 만들어내지 않지만, 그 위에서 만들어지는 가치를 흡수하는 구조를 가지고 있다. 부동산이 투자 자산으로서 매력적인 이유가 여기에 있다.</p>
<p>또한 부동산은 가격 상승뿐만 아니라 담보, 즉 레버리지로 활용할 수 있다. 예를 들어 10억 원짜리 집을 4억 원의 자기자본과 6억 원의 대출로 샀다고 가정해보자. 대출 금리가 5퍼센트이고 집값 상승률이 평균 8퍼센트라면, 단순 계산으로도 자기자본 수익률은 더 높아진다. 내 돈뿐 아니라 빌린 돈까지 자산 가격 상승의 영향을 받기 때문이다. 이렇게 자본 대비 더 큰 수익률을 올릴 수 있다. 하지만 부동산에도 분명한 한계가 있다. 필요할 때 즉시 현금화하기 어렵고, 거래 비용이 크며, 세금과 규제, 즉 정책 변화의 영향을 강하게 받는다. 무엇보다 정보의 비대칭성이 크고, 좋은 매물을 찾는 것 자체가 쉽지 않다.</p>
<p>이 책에서 주로 다루겠지만 나는 부동산 외에 주식이라는 자산에 주목할 필요가 있다고 생각한다. 이유는 단순하다. 회사 그 자체인 주식은 결국 사람에게 투자하는 것이기 때문이다. 회사는 그 &#39;모일 회(會)&#39;자와 &#39;모일 사(社)&#39;자의 한자어가 암시하듯 결국 사람이 모인 곳, 즉 사람들 그 자체라고도 할 수 있다. 그리고 그 조직은 끊임없이 새로운 가치를 만들어낸다. 앞서 말한 부동산이 가치를 흡수하는 구조라면, 기업은 가치를 창출하는 주체다. 좋은 기업은 시간이 지날수록 더 많은 가치를 만들어내고, 그 결과는 주주에게 돌아간다. 그래서 장기적으로 보면, 우수한 기업은 부동산 이상의 수익을 만든다 한다. 특히 혁신을 기반으로 성장하는 기업은 시장 자체를 확장시키며, 기존에 없던 가치를 만들어낸다. 이는 단순한 가격 상승이 아니라, 구조적인 성장이다.</p>
<p>그렇다면 최근 많은 관심을 받고 있는 암호화폐는 어떨까. 나는 이 영역에서도 결국 사람을 봐야 한다고 생각한다. 블록체인 기술을 이해하는 것도 중요하다. 하지만 기술만으로는 충분하지 않다. 그 기술을 믿고 사용하는 사람들이 얼마나 존재하는지, 그리고 앞으로 얼마나 더 늘어날지를 보는 것이 더 중요하다. 암호화폐는 기존 화폐 시스템과 다른 특징을 가지고 있다. 탈중앙화라는 개념이다. 기존의 화폐는 국가와 중앙은행이 발행하고 통제한다. 돈의 공급과 금리는 중앙에서 결정된다. 하지만 암호화폐는 그 권한을 분산시키려는 시도다. 특정 기관이 아닌 네트워크 참여자들이 시스템을 유지한다.</p>
<p>이러한 구조는 기존 시스템에 대한 불신이 있는 사람들에게 매력적으로 다가갈 수 있다. 정부와 중앙은행의 통제에서 벗어나고 싶어 하는 사람들이 존재하는 한, 암호화폐는 일정한 수요를 유지할 가능성이 있다. 물론 변동성이 크고, 규제 리스크도 존재한다. 하지만 이 역시 하나의 흐름이다. 어떤 사람들이 그 흐름을 만들어가고 있는지를 본다면, 그 방향을 조금 더 잘 이해할 수 있다.</p>
<p>어떤 자산이든, 그 가치를 만들어내는 주체는 사람이다. 사람이 모이는 곳에 돈이 모이고, 사람이 떠나는 곳에서는 돈도 함께 빠져나간다. 그래서 투자할 때는 숫자만 보지 말고, 그 숫자를 만들어내는 사람을 봐야 한다. 그것이 결국, 더 오래 살아남는 투자 방법이다.</p>
<h2 id="2-6-2장을-정리하며">2.6 2장을 정리하며</h2>
<p>2장에서 우리는 돈이 움직이는 구조를 살펴봤다. 결론부터 말하면, 자본주의는 그저 성실하게 일하고 월급을 모은다고 자연스럽게 부자가 되는 구조가 아니다. 물론 성실함은 중요하다. 하지만 성실함만으로는 부족하다. 돈이 어떻게 만들어지고, 어디로 먼저 흘러가며, 누구에게 유리하게 작동하는지를 이해하지 못하면 우리는 계속해서 뒤쪽에 서 있게 된다.</p>
<p>돈은 계속 풀린다. 그리고 그 돈은 동시에, 공평하게 퍼지지 않는다. 새로 만들어진 돈은 먼저 은행과 기업, 자산시장으로 흘러간다. 그 과정에서 자산 가격은 먼저 오르고, 우리는 한참 뒤에 월급이라는 형태로 그 영향을 받는다. 통장에 찍힌 숫자는 늘어날 수 있지만, 그 돈으로 살 수 있는 것은 오히려 줄어든다. 인플레이션은 단순히 물가가 오르는 현상이 아니라, 돈이 퍼지는 순서가 만들어내는 구조적 결과다.</p>
<p>금리 역시 이 구조를 더 분명하게 보여준다. 금리는 돈을 빌리는 비용이자, 신뢰의 가격이다. 신용도가 높고 자산이 많은 사람이나 기관은 낮은 금리로 돈을 빌릴 수 있다. 반면 평범한 개인은 더 높은 금리로 돈을 빌린다. 같은 돈을 빌리더라도 출발선이 다르다. 낮은 금리로 자금을 조달할 수 있는 사람은 더 많은 기회를 잡고, 높은 금리를 감당해야 하는 사람은 그만큼 불리한 위치에서 시작한다.</p>
<p>그 결과 빈익빈 부익부는 단순한 느낌이 아니라 실제로 지금도 우리 삶 속에서 일어나는 현상이다. 한 사회 안에서도 상위 1퍼센트의 소득과 자산 점유율은 커지고 있고, 국가 간에도 비슷한 흐름이 나타난다. 자본은 더 강한 시장, 더 높은 수익, 더 많은 기회가 있는 곳으로 이동한다. 가만히 있으면 중립이 아니라 후퇴가 된다. 이 구조 속에서는 움직이지 않는 것 자체가 뒤처지는 선택이 될 수 있다.</p>
<p>그렇기에 자본이 흐르는 방향을 이해하고, 그 흐름 위에 올라타야 한다. 직접 회사를 운영하기 어렵다면, 회사의 일부를 소유하면 된다. 그것이 주식이다. 주식은 단순히 오르내리는 숫자가 아니라, 기업의 성장에 참여하는 가장 현실적인 방법이다. 특히 장기적으로 자본이 강하게 흘러가는 시장을 선택하는 것은 중요한 판단이 된다.</p>
<p>그리고 이 모든 판단의 중심에는 결국 사람이 있다. 부동산도, 주식도, 암호화폐도 겉으로는 서로 다른 투자 대상처럼 보이지만, 그 가치를 만들고 유지하는 것은 결국 사람이다. 사람이 모이는 곳에 돈이 모이고, 사람이 떠나는 곳에서는 돈도 빠져나간다. 어떤 사람들이 모여 있는지, 그들이 어떤 가치를 만들어내고 있는지를 보지 못하면 투자도 제대로 보이지 않는다.</p>
<p>핵심은 돈을 이해해야 게임이 보인다는 것이다. 자본주의는 감정적으로 받아들일 대상이 아니라, 돈을 벌기 위해 반드시 이해해야 할 구조이며 우리가 지금 살고 있는 시스템이다. 불공평하다고 느끼는 데서 멈추면 아무것도 바뀌지 않는다. 중요한 것은 그 구조를 이해하고, 그 안에서 내가 설 위치를 바꿔야 한다는 점이다.</p>
<h1 id="제3장-투자에서-성공하려면">🔥 제3장. 투자에서 성공하려면</h1>
<h2 id="3-1-진입-장벽을-넘어라">3.1 진입 장벽을 넘어라</h2>
<p>투자라는 말을 들으면 어떤 생각이 드는가. 도전감이 샘솟는가 아니면 위험하다는 느낌이 먼저 드는가. 그렇다면 이렇게 질문을 바꿔보자. 이 자본주의 사회에서 정말 안전한 것은 무엇인가. 현금이 안전하다고 생각하는가. 통장에 넣어두면 지킬 수 있다고 믿는가. 하지만 우리는 이미 알고 있다. 시간이 지나면 돈의 가치는 떨어진다. 빅맥의 가격이 보여주듯, 같은 돈으로 살 수 있는 것은 점점 줄어든다. 가만히 있는 것이 안전한 선택이 아니라는 사실이 이미 증명되었다. 투자에 대한 두려움은 자연스럽다. 하지만 그 두려움은 우리가 반드시 넘어야 할 첫 번째 장벽이다. 아무것도 하지 않는 것이 가장 안전하다는 믿음이 오히려 가장 위험하다.</p>
<p>돈이 되는 곳에는 반드시 진입 장벽이 존재한다. 쉽게 들어갈 수 있는 곳에는 경쟁이 많고, 결국 평균적인 결과로 수렴한다. 반대로 진입이 어려운 곳일수록 기회는 남아 있다. 고학력 전문직을 생각해보자. 의사, 변호사, 연구자와 같은 직업은 누구나 쉽게 가질 수 없다. 오랜 시간과 노력이 필요하다. 그만큼 높은 보상을 받는다. 장인이라 불리는 사람들도 마찬가지다. 오랜 시간 쌓아온 기술이 있기에 누구나 대체할 수 없고, 그 가치가 인정된다. 사회적으로 꺼리는 직업도 비슷한 구조를 가진다. 심리적 장벽이 존재하기 때문에 사람들이 쉽게 선택하지 않는다. 그 결과 상대적으로 더 높은 보상이 주어진다.</p>
<p>부동산도 같은 원리다. 가격이 오르는 이유는 여러 가지가 있지만, 그중 하나는 진입 장벽이다. 초기 자본이 있어야 한다. 특히 비싼 부동산일수록 더 큰 자본이 필요하다. 누구나 접근할 수 없는 구조이기 때문에 그 안에서 기회가 발생한다. 정보에도 장벽이 있다. 예를 들어 어떤 지역에 지하철이 새로 들어온다는 계획이 있다고 해보자. 이 사실이 뉴스에 나오고 많은 사람들이 알게 되는 순간, 가격은 이미 상당 부분 반영되어 있다. 하지만 그보다 앞서 도시계획 자료를 보고, 개발 흐름을 읽고, 인구 이동을 분석해 미리 판단한 사람들은 훨씬 유리한 위치에 서게 된다.</p>
<p>주식 시장에도 마찬가지로 여러 장벽이 존재한다. 기업은 재무제표, 공시, 보고서 등을 통해 수많은 정보를 공개하고 있다. 하지만 현실적으로 대부분의 사람들은 이 자료들을 하나하나 읽고 분석할 시간도, 그것을 정확히 해석할 능력도 부족하다. 숫자는 넘쳐나지만, 그 숫자가 의미하는 바를 이해하는 것은 또 다른 문제다. 예를 들어 매출이 증가했다는 사실만으로 좋은 기업이라고 판단할 수 있을까. 그 매출이 일시적인 것인지, 구조적인 성장인지, 비용 구조는 어떻게 변하고 있는지까지 함께 봐야 한다. 결국 단순한 정보의 유무가 아니라, 그 정보를 해석하고 연결할 수 있는 능력 자체까지도 장벽이 된다.</p>
<p>하지만 이러한 정보의 장벽보다 내가 생각하는 더 거대한 장벽은 바로 인내다. 주식 시장에는 &quot;무릎에 사서 어깨에 팔라&quot;는 격언이 있다. 적당히 싸게 사서 적당히 비싸게 팔라는 의미다. 말은 쉽지만, 실제로 그렇게 행동하는 사람은 많지 않다. 상승장에서는 사람들이 몰린다. 주변에서 돈을 벌었다는 이야기가 들리고, 차트는 계속 올라간다. 그때 우리는 불안해진다. 지금이라도 들어가야 할 것 같은 조급함이 생긴다. 그리고 대부분 그 시점이 어깨다. 하락장에서는 반대가 벌어진다. 가격이 떨어지기 시작하면 처음에는 버틴다. 하지만 하락이 길어지면 공포가 커진다. 더 떨어질 것 같다는 생각에 결국 손절하게 된다. 그리고 그 시점이 무릎이다.</p>
<p>싸게 사고 비싸게 팔면 되는 이 간단한 원리를, 사람은 본능적으로 반대로 행동한다. 상승할 때 사고, 하락할 때 판다. 그래서 대부분의 투자자는 시장보다 낮은 수익률을 기록한다. 이 장벽을 넘는 방법은 단순하다. 시간을 아군으로 만드는 것이다. 뒤에서 더 자세히 다루겠지만 존 보글은 그의 저서 ≪모든 주식을 소유하라≫에서 시장 전체를 사서 오래 들고 있으라고 말했다. 개별 종목의 등락을 맞추려 하지 말고, 전체 시장의 성장에 올라타라는 것이다. 이 방식의 핵심은 인내다.</p>
<p>시간이 지나면 시장은 결국 우상향한다. 단기적으로는 변동성이 있지만, 장기적으로는 성장한다. 이 과정을 견디는 것 자체, 즉 인내가 장벽이다. 대부분의 사람들은 이 장벽을 넘지 못하기에 기회를 놓친다. 전문 투자자가 아닌 이상, 결국 투자에서 중요한 것은 세련된 투자 기술 혹은 방대한 정보의 양이 아니다. 인내의 장벽을 넘을 수 있느냐가 중요하다. 두려움, 조급함, 그리고 시간을 견디는 것. 이 세 가지가 투자에서의 진짜 진입 장벽이다.</p>
<p>그리고 이러한 장벽을 넘는 사람만이 단 과실을 맛볼 자격이 있다.</p>
<h2 id="3-2-단타와-트레이딩의-현실">3.2 단타와 트레이딩의 현실</h2>
<p>예금은 1년 내내 돈을 묶어두어도 4퍼센트를 받을까 말까 한데, 주식은 하루에도 예금과 비교가 되지 않을 정도로 요동칠 때가 많다. 하지만 이를 분석하는 데는 시간과 노력이 너무 많이 든다. 그래서 사람들은 기업을 공부하고 분석하기보다 차트를 보며 타이밍을 맞추는, 소위 단타나 트레이딩에 욕심내곤 한다. 차트를 보고 있으면 왠지 나도 저 흐름을 맞출 수 있을 것만 같다. 하지만 이 방식이 왜 어려운지부터 생각해볼 필요가 있다.</p>
<p>상장된 기업에 대한 정보는 대부분 공개되어 있다. 재무제표, 공시, 사업보고서 등 수많은 자료를 누구나 볼 수 있다. 하지만 가장 먼저 마주하는 문제는 그 자료를 읽는 것 자체가 쉽지 않다는 점이다. 주식 투자를 하면서도 기업의 경영 성과와 재무 상태를 보여주는 공식 문서인 재무제표를 제대로 읽을 줄 아는 사람은 많지 않다. 내부 정보는 둘째 치더라도, 세상에 공개되어 있는 정보조차 해석하지 못한 채 그 회사의 주식을 사는 것이 대다수 개인 투자자의 현실이다.</p>
<p>또 다른 문제는 이 정보가 숫자로만 표현되어 있다는 점이다. 숫자는 결과를 보여줄 뿐, 그 과정과 맥락을 충분히 설명해주지 않는다. 기업을 제대로 이해하기 위해서는 단순히 숫자를 보는 것을 넘어, 그 숫자가 만들어진 이유를 알아야 한다. 이를 흔히 ‘행간을 읽는다’고 표현한다. 매출이 왜 증가했는지, 비용이 왜 줄었는지, 이익이 일시적인지 구조적인지 판단하려면 한두 번의 확인이 아니라 꾸준한 관찰과 깊은 이해가 필요하다.</p>
<p>설령 한 기업을 분석했다고 치자. 하지만 세상에는 기업이 너무 많다. 한국 주식시장에 상장된 기업만 해도 약 2,500개가 넘는다. 여기에 미국 시장까지 포함하면 수천 개가 아니라 수만 개의 기업이 존재한다. 그리고 투자 대상은 주식만 있는 것이 아니다. ETF처럼 여러 주식을 묶어놓은 상품도 있고, 채권, 파생상품, 원자재 등 선택지는 끝없이 늘어난다. 이 많은 기업과 자산을 모두 이해한 뒤, 그중에서 단기적으로 가격이 움직일 대상을 골라낸다는 것은 현실적으로 매우 어려운 일이다.</p>
<p>설령 운 좋게 기업을 잘 이해했다고 하더라도 수수료라는 산도 넘어야 한다. 트레이딩은 사고파는 횟수가 많다. 거래가 많아질수록 수수료는 계속 쌓인다. 한 번의 거래에서는 크게 느껴지지 않을 수 있지만, 수십 번, 수백 번이 반복되면 그 비용은 무시할 수 없는 수준이 된다. 결국 수익을 내기 위해서는 시장뿐 아니라 수수료와 세금, 그리고 잦은 판단 실수까지 함께 이겨내야 한다. 이미 시작부터 불리한 게임을 하고 있는 셈이다.</p>
<p>물론 이런 삶을 실제로 살아가는 사람도 있다. 일본의 개인 투자자 후지모토 시게루는 그 대표적인 사례다. 그는 하루에도 수십, 수백 번씩 거래를 하며 단타 매매로 큰돈을 번 사람이다. 그의 저서 ≪주식 투자의 기쁨≫에는 시장과 싸우며 살아가는 트레이더의 일상이 담겨 있다. 하지만 그 삶을 자세히 들여다보면, 단순히 ‘돈을 버는 기술’ 이상의 것이 요구된다. 극도의 집중력, 끊임없는 긴장감, 그리고 하루도 쉬지 않고 시장을 쳐다봐야 하는 삶이다. 많은 사람이 단타를 ‘빠르게 돈 버는 방법’으로 상상하지만, 실제로는 하루의 대부분을 정보의 홍수 속에서 헤엄치는 고강도 노동에 가깝다.</p>
<p>나는 개인적으로 이런 삶에 굉장히 회의적이다. 단순히 취향의 문제일 수도 있지만, 결국 세상에 무엇을 남기는가에 대한 더 근본적인 의문이 남는다. 나는 세상에 득이 되고, 내가 배운 것을 나누는 삶을 지향한다. 단타로 얻은 수익은 개인이 각고의 노력 끝에 얻은 전리품일 수는 있다. 그러나 그 방식이 사회에 어떤 가치를 더하는지에 대해서는 여전히 의문이 든다. 내가 생각하는 투자는 누군가 혹은 어떤 기업을 믿고 지지하는 행위에 가깝다. 기업이 만들어내는 가치와 성장 가능성에 동참하는 것이지, 하루하루 예상되는 가격 변동에 따라 돈을 이리저리 옮기는 것만이 투자의 본질은 아니라고 생각한다.</p>
<p>물론 트레이딩 자체가 무조건 잘못되었다고 말하려는 것은 아니다. 시장에는 다양한 참여자가 필요하고, 단기 매매를 통해 유동성이 공급되는 측면도 있다. 다만 개인 투자자가 단타를 쉽게 돈 버는 방법처럼 받아들이는 것은 위험하다. 단타는 정보 해석 능력, 빠른 판단력, 감정 통제, 비용 부담, 시간 투입을 모두 요구한다. 그리고 그렇게까지 해도 성공이 보장되지 않는다. 오히려 대부분의 사람에게는 기업을 이해하고, 좋은 자산을 오래 보유하며, 자신의 삶을 더 생산적인 일에 쓰는 편이 훨씬 현실적이고 건강한 선택일 수 있다. 투자에서 중요한 것은 매일 시장을 이기는 것이 아니라, 시간이 지나도 후회하지 않을 방식으로 돈과 삶을 대하는 태도라고 생각한다.</p>
<h2 id="3-3-개별주를-투자한다는-건">3.3 개별주를 투자한다는 건</h2>
<p>이전 글에서 기업의 정보를 이해하는 일이 얼마나 어려운지에 대해 이야기했다. 그런데 개별주 투자의 어려움은 여기서 끝나지 않는다. 주식을 산다는 것은 법적으로 그 회사의 일부를 소유한다는 뜻이다. 그래서 우리는 주주라고 불린다. 하지만 현실에서 대부분의 개인 투자자는 회사의 경영 방향에 실질적인 영향력을 행사하기 어렵다. 주주총회에 참석할 수 있고 의결권을 행사할 수는 있지만, 소액주주의 목소리가 기업의 전략이나 인사, 투자 결정에 직접 반영되는 경우는 많지 않다.</p>
<p>더 큰 문제는 내부 정보의 벽이다. 회사 안에서 어떤 논의가 오가고 있는지, 경영진이 실제로 무엇을 고민하고 있는지, 특정 사업이 겉으로 보이는 것만큼 잘 진행되고 있는지 일반 투자자가 정확히 파악하기는 어렵다. 공시는 이미 정리되고 걸러진 결과물에 가깝다. 사업보고서도 회사가 세상에 내놓을 수 있는 언어로 쓰인 문서다. 그 안에 중요한 정보가 담겨 있는 것은 맞지만, 그것만으로 기업의 현실을 온전히 알 수 있다고 믿는 것은 위험하다.</p>
<p>결국 개별주 투자는 처음부터 정보의 비대칭 속에서 출발한다. 기업 내부자, 기관투자자, 애널리스트, 업계 관계자들은 일반 개인보다 더 많은 정보와 해석 능력을 가지고 있을 가능성이 높다. 개인 투자자는 이미 공개된 자료를 뒤늦게 읽고, 뉴스와 보고서를 따라가며, 제한된 정보 안에서 판단해야 한다. 물론 이 한계를 극복하는 뛰어난 투자자도 있다. 하지만 적어도 개별주 투자가 단순히 좋아 보이는 회사 하나를 고르는 일이 아니라는 점은 분명하다.</p>
<p>여기에 한국 주식시장 특유의 테마주 문화가 더해지면 문제는 훨씬 복잡해진다. 테마주는 기업의 본질적인 실적이나 장기 경쟁력보다 특정 사건, 정책, 인물, 사회적 분위기에 따라 주가가 움직이는 주식을 말한다. 물론 어떤 정책이나 산업 변화가 기업의 실적에 실제 영향을 줄 수는 있다. 하지만 많은 테마주는 그 연결고리가 지나치게 약하거나, 실체보다 기대와 소문이 앞서는 경우가 많다.</p>
<p>대표적인 예가 남북 경협주다. 남북 관계가 화해 분위기로 흐를 때마다 철도, 건설, 시멘트, 비료, 개성공단 관련 기업들이 주목받곤 했다. 특히 남북 철도 연결이나 북한 인프라 개발 가능성이 언급되면, 실제 사업 수주 여부가 확인되지 않았는데도 관련주로 묶인 기업들의 주가가 급등하는 일이 있었다. 대아티아이, 부산산업 같은 철도 관련주들이 남북 철도 연결 기대감 속에서 주목받았던 것이 그 사례다. 이때 투자자들이 산 것은 기업의 현재 실적이라기보다 언젠가 북한으로 철도가 연결될지도 모른다는 기대였다.</p>
<p>정치 테마주는 더 극단적이다. 특정 정치인이 선거에서 유리해 보이면 그 정치인과 학연, 지연, 인맥, 과거 경력 등으로 연결된 기업들이 함께 움직인다. 실제로 안랩은 안철수 의원이 창업자이자 대주주라는 이유로 정치적 이벤트 때마다 주가가 출렁였고, 써니전자 역시 안철수 테마주로 분류되며 가격제한폭까지 오른 사례가 보도된 바 있다.</p>
<p>다른 정치인들도 마찬가지다. 윤석열 전 대통령과 관련해서는 NE능률, 서연 등이 테마주로 거론된 적이 있고, 홍준표 전 대구시장과 관련해서는 경남스틸, 휴맥스홀딩스, 보광산업 등이 정치 테마주로 움직인 사례가 있다. 이재명 대통령과 관련해서는 에이텍, 동신건설, 형지 계열주, 오리엔트정공 등이 시장에서 관련주로 언급되곤 했다. 중요한 것은 이 기업들이 실제로 해당 정치인의 당선이나 정책으로 얼마나 이익을 얻을지 명확하지 않은 경우가 많다는 점이다.</p>
<p>이런 현상은 개별주 투자의 본질적인 어려움을 더 악화시킨다. 원래도 기업을 분석하는 일은 어렵다. 그런데 테마주가 되면 분석의 대상이 기업이 아니라 분위기가 된다. 재무제표보다 여론조사가 중요해지고, 사업보고서보다 정치 뉴스가 중요해지며, 실적보다 후보자의 말 한마디가 더 크게 작용한다. 투자자는 기업의 가치를 판단하는 것이 아니라, 다른 사람들이 무엇에 흥분할지를 예측하는 게임에 들어가게 된다.</p>
<p>문제는 이런 게임일수록 감정이 개입되기 쉽다는 점이다. 내가 종사하는 산업의 기업이면 더 좋게 보인다. 내가 좋아하는 브랜드면 더 믿고 싶어진다. 내가 지지하는 정치인과 연결된 주식이면 그 기업의 약점보다 가능성을 먼저 보게 된다. 반대로 내가 싫어하는 정치인이나 산업과 관련된 기업은 과소평가하기 쉽다. 투자는 숫자와 논리로 해야 한다고 말하지만, 실제 투자자는 감정에서 자유롭지 않다.</p>
<p>하지만 주식시장은 내 감정을 보상해주지 않는다. 내가 어떤 회사를 좋아한다고 해서 그 회사의 이익이 늘어나는 것은 아니다. 내가 어떤 정치인을 지지한다고 해서 그와 관련된 기업의 가치가 올라가는 것도 아니다. 설령 단기적으로 주가가 오르더라도, 그것이 기업의 실제 가치 상승이 아니라 기대와 소문에 의한 것이라면 언젠가 그 기대는 식을 수밖에 없다. 테마주는 오를 때는 이유가 많아 보이지만, 떨어질 때는 그 이유들이 순식간에 사라진다.</p>
<p>개별주 투자가 불가능하다는 뜻은 아니다. 충분한 시간과 전문성을 갖춘 사람에게 개별주 투자는 분명 의미 있는 선택이 될 수 있다. 그러나 본업이 따로 있는 일반 투자자에게 개별주 투자는 생각보다 훨씬 어려운 일이다. 기업을 깊이 이해해야 하고, 제한된 정보 속에서 판단해야 하며, 무엇보다 자신의 감정까지 경계해야 하기 때문이다.</p>
<h2 id="3-4-다양한-상품-그-뒤의-이면">3.4 다양한 상품, 그 뒤의 이면</h2>
<p>세상에는 투자 상품을 권하는 사람들이 많다. 은행 창구에서도, 증권사 앱에서도, 유튜브 영상에서도, 뉴스 기사에서도 끊임없이 말한다. 지금은 예금만 해서는 안 된다고, 돈을 굴려야 한다고, 좋은 상품을 골라야 한다고. 그 말 자체가 틀린 것은 아니다. 돈은 가만히 두면 인플레이션에 의해 가치가 줄어들고, 자산을 제대로 배분하는 일은 분명 중요하다. 하지만 여기서 한 가지 질문을 던져봐야 한다. 과연 그들은 정말 우리를 위해서 그런 상품을 권하는 걸까.</p>
<p>EBS 다큐멘터리 ≪자본주의≫에는 금융회사가 어떻게 고객에게 상품을 권하고, 그 과정에서 어떤 이해관계가 작동하는지 잘 드러난다. 금융회사는 자선단체가 아니다. 은행, 증권사, 보험사, 자산운용사는 모두 이익을 내야 하는 기업이다. 그들이 상품을 만들고, 판매하고, 광고하는 이유는 고객의 미래를 걱정해서만은 아니다. 그 안에는 수수료가 있고, 운용보수가 있고, 판매수당이 있고, 회사의 실적이 있다.</p>
<p>물론 모든 금융 상품이 나쁘다는 뜻은 아니다. 예금, 적금, 펀드, ETF, 연금, 채권, 리츠 같은 상품들은 각자의 목적과 기능이 있다. 어떤 사람에게는 예금이 필요하고, 어떤 사람에게는 연금저축펀드가 필요하며, 어떤 사람에게는 저비용 ETF가 좋은 선택이 될 수도 있다. 문제는 상품 자체가 아니라, 그 상품이 누구에게 더 큰 이익을 주도록 설계되어 있는가를 보지 못하는 데 있다.</p>
<p>예를 들어 펀드를 생각해보자. 펀드는 여러 사람의 돈을 모아 전문가가 대신 투자해주는 상품이다. 투자 지식이 부족한 사람에게는 편리해 보인다. 하지만 펀드에는 운용보수와 판매보수가 붙는다. 내가 수익을 내든 못 내든 일정한 비용은 계속 빠져나간다. 수익률이 좋을 때는 크게 느껴지지 않지만, 장기간 투자하면 이 작은 비용 차이가 큰 차이를 만든다. 결국 나는 시장의 위험을 감수하고, 금융회사는 비교적 안정적으로 수수료를 가져간다.</p>
<p>건물에 투자한다고 하면 안정적인 임대수익이 떠오른다. 실제로 좋은 자산에 잘 투자하면 꾸준한 현금흐름을 얻을 수도 있다. 하지만 부동산도 공실, 금리 상승, 자산 가격 하락, 유동성 부족이라는 위험을 가진다. 게다가 내가 직접 건물을 소유하는 것이 아니라 상품을 통해 간접적으로 투자한다면, 그 사이에는 운용사와 판매사, 각종 비용 구조가 존재한다. 내가 부동산에 투자한다고 생각했지만, 실제로는 여러 이해관계자가 설계한 구조 안에 들어가는 것일 수 있다.</p>
<p>이 구조를 금융회사 입장에서 보면 더 분명해진다. 금융회사는 사람들의 돈을 모으고 싶어 한다. 고객의 예금, 보험료, 펀드 가입금, 연금 자금은 모두 금융회사 입장에서는 운용할 수 있는 자본이다. 개인에게는 노후자금이고, 비상금이고, 평생 모은 돈이지만, 금융회사 입장에서는 굴릴 수 있는 돈이다. 그래서 그들은 끊임없이 상품을 만든다. 안정형 상품, 중위험 중수익 상품, 글로벌 분산투자 상품, 월지급식 상품, 절세 상품, 노후 대비 상품. 이름은 다양하지만 결국 당신의 돈을 자신들의 시스템 안으로 끌어들이려 하는 것이다.</p>
<p>조금 거칠게 말하면, 그들은 먹음직스러운 자본이 가만히 있는 꼴을 보고만 있지 못한다. 누군가의 통장에 큰돈이 쌓여 있다면 그것은 금융회사에게 기회다. 누군가의 퇴직금 또한 기회다. 누군가가 집을 팔아 현금을 보유하고 있다면, 누군가가 상속을 받았다면, 누군가가 목돈을 모았다면, 그 돈은 곧 여러 상품의 대상이 된다. 그냥 두면 아깝다는 말은 맞을 수 있다. 하지만 그 말을 하는 사람이 왜 그렇게 말하는지도 함께 봐야 한다. 그들은 당신의 돈을 필요로 한다. 당신이 가진 돈은 당신이 생각하는 것보다 훨씬 큰 가치를 지니고 있다.</p>
<p>문제는 많은 사람들이 자기 돈의 가치를 과소평가한다는 점이다. &#39;나는 투자에 대해 잘 모르니까 전문가에게 맡기는 게 낫겠지&#39;, &#39;은행에서 추천한 상품이니 괜찮겠지&#39;, &#39;다들 가입한다니까 나도 해야겠지&#39;라고 생각한다. 하지만 그렇게 맡기는 순간, 내 돈이 만들어낼 수 있는 가치의 일부는 다른 사람에게 넘어간다. 수수료라는 이름으로, 보수라는 이름으로, 사업비라는 이름으로, 판매수당이라는 이름으로 빠져나간다.</p>
<p>물론 모든 것을 혼자 해야 한다는 뜻은 아니다. 전문가의 도움은 필요할 수 있다. 금융 상품도 잘 활용하면 삶에 도움이 된다. 예금은 안전한 현금 관리 수단이 될 수 있고, 보험은 큰 위험을 막아줄 수 있으며, 연금 상품은 노후 준비에 도움을 줄 수 있다. ETF나 인덱스 펀드는 장기 투자자에게 효율적인 도구가 될 수도 있다. 중요한 것은 상품을 무조건 거부하는 것이 아니라, 그 상품이 누구를 위해 만들어졌고, 비용은 얼마이며, 위험은 무엇이고, 내가 직접 했을 때와 무엇이 다른지를 따져보는 일이다.</p>
<p>투자 상품은 포장지가 화려할수록 더 조심해야 한다. &#39;안정적 수익&#39;, &#39;절세 효과&#39;, &#39;전문가 운용&#39;, &#39;월급처럼 받는 현금흐름&#39;, &#39;예금보다 높은 수익&#39; 같은 말은 듣기 좋다. 하지만 좋은 말이 많을수록 그 뒤의 구조를 봐야 한다. 누가 돈을 버는가. 나는 어떤 위험을 지는가. 중간에서 빠져나가는 비용은 얼마인가. 손실이 났을 때 책임은 누구에게 있는가. 이 질문에 답하지 못한다면, 나는 투자한 것이 아니라 판매된 것이다.</p>
<p>결국 돈은 힘이다. 내가 가진 돈은 누군가에게는 운용 자산이고, 누군가에게는 수수료의 원천이며, 누군가에게는 더 큰 수익을 만들기 위한 지렛대다. 그래서 내 돈을 남에게 맡길 때는 조심해야 한다. 그들이 내 돈을 소중히 여긴다고 해서, 반드시 나의 이익을 최우선으로 생각하는 것은 아니다.</p>
<p>돈은 그냥 숫자가 아니다. 내가 일해서 번 시간이고, 내가 미룬 소비이며, 내가 지켜야 할 미래다. 그 돈의 가치를 가장 잘 지켜야 할 사람은 결국 나 자신이다.</p>
<h2 id="3-5-과도한-욕심을-버려라">3.5 과도한 욕심을 버려라</h2>
<p>투자를 하다 보면 마음이 쉽게 급해진다. 누군가는 몇 달 만에 몇십 퍼센트를 벌었다고 하고, 누군가는 특정 종목으로 자산을 몇 배로 불렸다고 말한다. 그런 이야기를 듣고 있으면 나만 뒤처지는 것 같고, 지금보다 더 공격적으로 투자해야 할 것 같은 불안이 생긴다. 하지만 투자를 오래 하기 위해 가장 먼저 버려야 할 것은 조급함이고, 그다음으로 버려야 할 것은 과도한 욕심이다.</p>
<p>당신이 아직 큰 부자가 아니라면, 헤지펀드나 사모펀드 같은 말에 쉽게 흔들릴 필요가 없다. 그런 상품이 무조건 나쁘다는 뜻은 아니다. 다만 그 세계는 대체로 정보, 자본, 네트워크가 있는 사람들이 접근하는 영역이다. 많은 돈을 가진 사람들은 자본의 장벽을 넘을 수 있고, 손실을 감당할 여력도 있으며, 좋은 조건의 상품에 접근할 가능성도 높다. 무엇보다 누군가 정말 좋은 투자 기회를 알고 있다면, 그것을 굳이 아무 대가 없이 당신에게 알려줄 이유가 없다. 투자의 세계에서 &#39;좋은 소스&#39;라는 말은 대개 위험하다. 남들이 모르는 기회처럼 들리지만, 실제로는 내가 이해하지 못하는 위험에 가깝다.</p>
<p>또한 옆 사람이 투자로 돈을 벌었다는 말에도 너무 귀 기울일 필요가 없다. 특히 그 사람이 어떤 분석을 했는지, 어떤 위험을 감수했는지, 그 수익이 운이었는지 실력이었는지 알 수 없다면 더욱 그렇다. 사람들은 결과만 말한다. &quot;이 종목으로 얼마 벌었다&quot;, &quot;코인으로 몇 배 먹었다&quot;, &quot;부동산으로 크게 벌었다&quot;는 이야기는 쉽게 들리지만, 그 과정에서 얼마나 흔들렸는지, 얼마나 많은 손실을 봤는지, 지금도 같은 방식으로 돈을 벌 수 있는지는 잘 말하지 않는다.</p>
<p>투자는 단지 옆 사람을 지나치면 끝나는 단기 레이스가 아니라, 끝도 없이 달려야 하는 장기 레이스다. 내가 아는 사람 중에도 한때 투자로 돈을 벌었다고 말하던 사람들이 있었다. 함께 모여서 식사하는 그 한두 시간 사이에도 계좌가 수십만 원이 올랐다고 하는 이도 있었다. 하지만 나는 그들이 앞으로도 계속해서 그렇게 벌 수 있는 가능성이 그리 높지 않다고 본다. 그리고 무엇보다 사람들은 잘 될 때만 이야기한다. 수익이 났을 때는 자신 있게 말하고 주변에 자랑한다. 하지만 손실이 커졌을 때, 물려 있을 때, 팔지 못하고 버티고 있을 때, 잘못된 선택을 후회하고 있을 때는 조용해진다. 그래서 우리가 듣는 투자 이야기는 대부분 편향되어 있다.</p>
<p>이 편향을 모르면 평정심을 잃는다. 남들은 다 돈을 버는 것 같고, 나만 기회를 놓치는 것 같다. 그러다 보면 원칙 없이 투자하게 된다. 잘 모르는 상품에 들어가고, 이해하지 못하는 종목을 사고, 감당하기 어려운 위험을 진다. 하지만 시장에서 오래 살아남는 사람은 흥분한 사람이 아니라 평정심을 지킨 사람이다. 남의 수익률에 흔들리지 않고, 내가 이해할 수 있는 범위 안에서, 내가 감당할 수 있는 위험만 지는 사람이 오래 간다.</p>
<p>그렇다면 어디까지가 합리적인 기대이고, 어디서부터가 과도한 욕심일까. 그 기준점 중 하나로 S&amp;P500을 주목해 볼 필요가 있다. S&amp;P500은 미국의 대표적인 500개 대형 기업으로 구성된 지수로 미국 시장 그 자체로 봐도 무방하다. 세계에서 가장 많은 투자자와 전문가들이 이 지수를 기준으로 자신의 성과를 비교한다. 그런데 장기적으로 이 지수의 수익률을 꾸준히 넘어서는 투자자는 많지 않다.</p>
<p>2024년 연말 SPIVA, 즉 S&amp;P Indices Versus Active 미국 스코어카드에 따르면, 2024년 한 해 동안 S&amp;P500보다 낮은 수익률을 기록한 전문 투자자의 비율은 65.2퍼센트였다. 다시 말해 그해 S&amp;P500을 이긴 전문 투자자는 34.8퍼센트에 그쳤다. 기간을 길게 보면 차이는 더 벌어진다. 5년 누적으로는 76.3퍼센트가 S&amp;P500을 넘지 못했고, 10년 누적으로는 84.3퍼센트, 15년 누적으로는 92.5퍼센트, 20년 누적으로는 94퍼센트가 S&amp;P500보다 낮은 성과를 기록했다. 반대로 말하면 20년 동안 S&amp;P500을 이긴 전문 투자자는 6퍼센트에 불과했다. 이처럼 수많은 전문가들이 시간과 인력과 정보를 쏟아붓지만, 시장 전체를 지속적으로 이기는 일은 생각보다 훨씬 어렵다.</p>
<p>그렇다면 일반 투자자가 가져야 할 태도는 분명하다. 시장의 평균에서 크게 벗어나려고 무리하지 않는 것이다. 평균이 시시해 보여도, 장기적으로 좋은 시장의 평균을 꾸준히 따라가는 것은 매우 강력한 전략이다. 오히려 문제는 평균을 무시하고, 더 빠른 길을 찾다가 길을 잃는 데 있다. 투자는 화려한 한 번의 성공보다 꾸준한 생존이 중요하다.</p>
