      },
      en: {
        file: "핵박사 군인의 핵심 주식투자_EN.md",
        htmlLang: "en",
        heroImage: "plots/5.3.2_virtual_qqq_qld_tqqq_EN.png",
        copy: {
          documentTitle: "Nuclear Ph.D's Core Leveraged ETF",
          metaDescription: "Nuclear Ph.D's Core Leveraged ETF - a long-term leveraged ETF investing essay and data charts",
          brandLabel: "Go to top",
          brandText: "Nuclear Ph.D's Core Leveraged ETF",
          skipText: "Skip to text",
          kicker: "A Long-Term Leveraged ETF Investing Note",
          title: "Nuclear Ph.D's Core Leveraged ETF",
          lead: "From financial illiteracy to the principle of buying the whole market and holding for the long term, this page organizes the book text and data charts for comfortable reading.",
          tocTitle: "Contents",
          loading: "Loading the text.",
          errorTitle: "Could not load the text.",
          languageLabel: "Language",
          themeLabel: "Theme",
          textSizeLabel: "Text size",
          textDecrease: "Decrease text size",
          textIncrease: "Increase text size",
          tocOpen: "Open contents",
          tocClose: "Close contents",
          backToTop: "Back to top"
        },
        captions: {
          "plots/1.6_bigmac_index_EN.png": "Big Mac Index and Purchasing Power Comparison",
          "plots/2.3.1_wid_inequality_trends_IncomeTop1_EN.png": "Top 1% Income Share Trends",
          "plots/2.3.1_wid_inequality_trends_WealthTop1_EN.png": "Top 1% Wealth Share Trends",
          "plots/2.3.2_wid_per_capita_gdp_EN.png": "GDP per Capita Trends",
          "plots/2.3.3_wid_gdp_per_capita_relative_to_us_EN.png": "GDP per Capita Relative to the United States",
          "plots/3.5_rule_of_72_vs_actual_compound_EN.png": "Rule of 72 vs Actual Compounding",
          "plots/4.5_real_estate_vs_sp500_comparison_EN.png": "Expected Return Comparison: Real Estate vs S&P 500",
          "plots/5.3.1_leverage_cagr_errorbar_EN.png": "CAGR Distribution by Leverage Ratio",
          "plots/5.3.2_virtual_qqq_qld_tqqq_EN.png": "Long-Term Hypothetical Comparison of QQQ, QLD, and TQQQ",
          "plots/5.4_simulate_qqq_qld_tqqq_holding_periods_EN.png": "Holding-Period Simulation for QQQ, QLD, and TQQQ",
          "plots/7.2_qld_tax_simulation_30years_EN.png": "QLD 30-Year Holding and Tax-Savings Simulation"
        }
      }
    };

    const TEXT_SCALES = [0.9, 1, 1.1, 1.22, 1.35];
    const DEFAULT_LANGUAGE = "ko";
    const storedLanguage = localStorage.getItem("book-language");
    let currentLanguage = BOOKS[storedLanguage] ? storedLanguage : DEFAULT_LANGUAGE;
    let textScaleIndex = 1;
    let tocObserver = null;
    let loadRequestId = 0;

    const article = document.getElementById("book");
    const toc = document.getElementById("toc");
    const progressBar = document.getElementById("progressBar");
    const backToTop = document.getElementById("backToTop");
    const bookTemplate = document.getElementById("bookTemplate");
    const languageButtons = Array.from(document.querySelectorAll("[data-language-choice]"));
    const themeButtons = Array.from(document.querySelectorAll("[data-theme-choice]"));
    const ui = {
      skipLink: document.getElementById("skipLink"),
      brandLink: document.getElementById("brandLink"),
      brandText: document.getElementById("brandText"),
      languageControl: document.getElementById("languageControl"),
      themeControl: document.getElementById("themeControl"),
      textSizeControl: document.getElementById("textSizeControl"),
      textDecrease: document.getElementById("textDecrease"),
      textIncrease: document.getElementById("textIncrease"),
      tocToggle: document.getElementById("tocToggle"),
      tocBackdrop: document.getElementById("tocBackdrop"),
      tocPanel: document.getElementById("tocPanel"),
      heroKicker: document.getElementById("heroKicker"),
      heroTitle: document.getElementById("heroTitle"),
      heroLead: document.getElementById("heroLead"),
      tocTitle: document.getElementById("tocTitle")
    };

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderInline(value) {
      let html = escapeHtml(value);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/(^|[\s(])(https?:\/\/[^\s)]+)/g, (match, lead, url) => {
        const cleanUrl = url.replace(/[.,;]+$/, "");
        const tail = url.slice(cleanUrl.length);
        return `${lead}<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>${tail}`;
      });
      return html;
    }

    function normalizeMarkdown(markdown) {
      return markdown
        .replace(/\r\n/g, "\n")
        .replace(/!\[\[([^\]]+)\]\]/g, (match, rawPath) => {
          const path = rawPath.includes("/") ? rawPath : `plots/${rawPath}`;
          return `![](${path})`;
        });
    }

    function captionForSrc(src, alt) {
      return BOOKS[currentLanguage].captions[src] || alt || src.split("/").pop();
    }

    function slugger() {
      const seen = new Map();

      return (text) => {
        const stripped = text
          .replace(/[^\p{Letter}\p{Number}]+/gu, "-")
          .replace(/^-+|-+$/g, "")
          .toLowerCase();
        const base = stripped || "section";
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        return count ? `${base}-${count + 1}` : base;
      };
    }

    function markdownToHtml(markdown) {
      const makeSlug = slugger();
      const lines = normalizeMarkdown(markdown).split("\n");
      const headings = [];
      const output = [];
      let paragraph = [];
      let inList = false;
      let liOpen = false;

      const flushParagraph = () => {
        if (!paragraph.length) return;
        output.push(`<p>${renderInline(paragraph.join(" "))}</p>`);
        paragraph = [];
      };

      const closeList = () => {
        if (liOpen) {
          output.push("</li>");
          liOpen = false;
        }
        if (inList) {
          output.push("</ul>");
          inList = false;
        }
      };

      for (const line of lines) {
        const trimmed = line.trim();

        if (!trimmed) {
          flushParagraph();
          closeList();
          continue;
        }

        const heading = /^(#{1,6})\s+(.+)$/.exec(trimmed);
        if (heading) {
          flushParagraph();
          closeList();
          const level = heading[1].length;
          const text = heading[2].trim();
          const id = makeSlug(text);
          headings.push({ level, text, id });
          output.push(`<h${level} id="${id}">${renderInline(text)}</h${level}>`);
          continue;
        }

        const image = /^!\[([^\]]*)\]\(([^)]+)\)\s*$/.exec(trimmed);
        if (image) {
          flushParagraph();
          closeList();
          const alt = image[1].trim();
          const src = image[2].trim();
          const caption = captionForSrc(src, alt);
          output.push([
            '<figure class="book-figure">',
            `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt || caption)}" loading="lazy">`,
            `<figcaption>${escapeHtml(caption)}</figcaption>`,
            "</figure>"
          ].join(""));
          continue;
        }

        const bullet = /^\s*[-*]\s+(.+)$/.exec(line);
        if (bullet) {
          flushParagraph();
          if (!inList) {
            output.push("<ul>");
            inList = true;
          }
          if (liOpen) output.push("</li>");
          output.push(`<li>${renderInline(bullet[1].trim())}`);
          liOpen = true;
          continue;
        }

        const listDetail = /^\s{2,}(.+)$/.exec(line);
        if (inList && liOpen && listDetail) {
          output.push(`<p class="list-detail">${renderInline(listDetail[1].trim())}</p>`);
          continue;
        }

        closeList();
        paragraph.push(trimmed);
      }

      flushParagraph();
      closeList();

      return { html: output.join("\n"), headings };
    }

    function renderToc(headings) {
      const useful = headings.filter((heading) => heading.level <= 2);
      toc.innerHTML = useful.map((heading) => {
        return `<a class="level-${heading.level}" href="#${heading.id}" data-target="${heading.id}">${escapeHtml(heading.text)}</a>`;
      }).join("");
    }

    function initScrollSpy() {
      if (tocObserver) {
        tocObserver.disconnect();
      }

      const links = Array.from(toc.querySelectorAll("a"));
      const sections = links
        .map((link) => document.getElementById(link.dataset.target))
        .filter(Boolean);

      if (!sections.length) return;

      tocObserver = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        links.forEach((link) => {
          link.classList.toggle("active", link.dataset.target === visible.target.id);
        });
      }, {
        rootMargin: "-18% 0px -72% 0px",
        threshold: [0, 0.1, 0.25, 0.5, 1]
      });

      sections.forEach((section) => tocObserver.observe(section));
    }

    function initProgress() {
      const update = () => {
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const progress = max > 0 ? (window.scrollY / max) * 100 : 0;
        progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
        backToTop.classList.toggle("visible", window.scrollY > 520);
      };

      update();
      window.addEventListener("scroll", update, { passive: true });
      window.addEventListener("resize", update);
    }

    function setTheme(theme, persist = true) {
      document.documentElement.dataset.theme = theme;
      themeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.themeChoice === theme));
      });
      if (persist) localStorage.setItem("book-theme", theme);
    }

    function initTheme() {
      const stored = localStorage.getItem("book-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const initial = stored === "dark" || stored === "light" ? stored : (prefersDark ? "dark" : "light");
      setTheme(initial, false);

      themeButtons.forEach((button) => {
        button.addEventListener("click", () => setTheme(button.dataset.themeChoice));
      });
    }

    function closestTextScaleIndex(value) {
      return TEXT_SCALES.reduce((best, scale, index) => {
        return Math.abs(scale - value) < Math.abs(TEXT_SCALES[best] - value) ? index : best;
      }, 1);
    }

    function applyTextScale(index, persist = true) {
      textScaleIndex = Math.min(TEXT_SCALES.length - 1, Math.max(0, index));
      const scale = TEXT_SCALES[textScaleIndex];
      document.documentElement.style.setProperty("--article-scale", String(scale));
      ui.textDecrease.disabled = textScaleIndex === 0;
      ui.textIncrease.disabled = textScaleIndex === TEXT_SCALES.length - 1;
      if (persist) localStorage.setItem("book-text-scale", String(scale));
    }

    function initTextSize() {
      const stored = Number(localStorage.getItem("book-text-scale"));
      textScaleIndex = Number.isFinite(stored) ? closestTextScaleIndex(stored) : 1;
      applyTextScale(textScaleIndex, false);

      ui.textDecrease.addEventListener("click", () => applyTextScale(textScaleIndex - 1));
      ui.textIncrease.addEventListener("click", () => applyTextScale(textScaleIndex + 1));
    }

    function isTocOpen() {
      return document.body.classList.contains("toc-open");
    }

    function updateTocToggleLabel() {
      const copy = BOOKS[currentLanguage].copy;
      const label = isTocOpen() ? copy.tocClose : copy.tocOpen;
      ui.tocToggle.setAttribute("aria-label", label);
      ui.tocToggle.setAttribute("title", label);
      ui.tocToggle.setAttribute("aria-expanded", String(isTocOpen()));
    }

    function setTocOpen(open) {
      document.body.classList.toggle("toc-open", open);
      updateTocToggleLabel();
    }

    function closeToc() {
      setTocOpen(false);
    }

    function initMobileToc() {
      ui.tocToggle.addEventListener("click", () => {
        setTocOpen(!isTocOpen());
      });

      ui.tocBackdrop.addEventListener("click", closeToc);

      toc.addEventListener("click", (event) => {
        if (event.target.closest("a")) closeToc();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeToc();
      });

      window.addEventListener("resize", () => {
        if (!window.matchMedia("(max-width: 980px)").matches) closeToc();
      });

      updateTocToggleLabel();
    }

    function updateLanguageButtons() {
      languageButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.languageChoice === currentLanguage));
      });
    }

    function applyLanguageCopy(language) {
      const book = BOOKS[language];
      const copy = book.copy;
      const metaDescription = document.querySelector('meta[name="description"]');

      document.documentElement.lang = book.htmlLang;
      document.documentElement.dataset.language = language;
      document.documentElement.style.setProperty("--hero-image", `url("${book.heroImage}")`);
      document.title = copy.documentTitle;
      if (metaDescription) metaDescription.setAttribute("content", copy.metaDescription);

      ui.skipLink.textContent = copy.skipText;
      ui.brandLink.setAttribute("aria-label", copy.brandLabel);
      ui.brandText.textContent = copy.brandText;
      ui.languageControl.setAttribute("aria-label", copy.languageLabel);
      ui.themeControl.setAttribute("aria-label", copy.themeLabel);
      ui.textSizeControl.setAttribute("aria-label", copy.textSizeLabel);
      ui.textDecrease.setAttribute("aria-label", copy.textDecrease);
      ui.textIncrease.setAttribute("aria-label", copy.textIncrease);
      backToTop.setAttribute("aria-label", copy.backToTop);
      ui.heroKicker.textContent = copy.kicker;
      ui.heroTitle.textContent = copy.title;
      ui.heroLead.textContent = copy.lead;
      ui.tocPanel.setAttribute("aria-label", copy.tocTitle);
      ui.tocTitle.textContent = copy.tocTitle;
      updateLanguageButtons();
      updateTocToggleLabel();
    }

    function initLanguage() {
      languageButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const next = button.dataset.languageChoice;
          if (!BOOKS[next] || next === currentLanguage) return;
          localStorage.setItem("book-language", next);
          loadBook(next);
        });
      });
      applyLanguageCopy(currentLanguage);
    }

    function headingsFromElement(root) {
      return Array.from(root.querySelectorAll("h1, h2, h3, h4, h5, h6"))
        .map((heading) => ({
          level: Number(heading.tagName.slice(1)),
          text: heading.textContent.trim(),
          id: heading.id
        }))
        .filter((heading) => heading.id && heading.text);
    }

    function renderBook(rendered) {
      article.classList.remove("loading");
      article.setAttribute("lang", BOOKS[currentLanguage].htmlLang);
      article.innerHTML = rendered.html;
      renderToc(rendered.headings);
      initScrollSpy();
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(() => window.dispatchEvent(new Event("resize")));
      }
    }

    function getEmbeddedBook() {
      if (!bookTemplate) return null;
      const html = bookTemplate.innerHTML.trim();
      if (!html) return null;
      const wrapper = document.createElement("div");
      wrapper.innerHTML = html;
      return { html, headings: headingsFromElement(wrapper) };
    }

    function renderError(file, error) {
      const copy = BOOKS[currentLanguage].copy;
      const message = currentLanguage === "ko"
        ? `<code>${escapeHtml(file)}</code> 파일과 <code>plots/</code> 폴더가 index.html과 같은 위치에 있는지 확인해 주세요. 영어 문서는 로컬 서버에서 열어야 불러올 수 있습니다.`
        : `Check that <code>${escapeHtml(file)}</code> and the <code>plots/</code> folder are next to index.html. If you opened this as a local file, run it through a local web server so the Markdown file can be loaded.`;

      article.classList.remove("loading");
      article.innerHTML = `
        <div class="error-box">
          <h2>${escapeHtml(copy.errorTitle)}</h2>
          <p>${message}</p>
        </div>
      `;
      console.error(error);
    }

    async function loadBook(language = currentLanguage) {
      const requestId = ++loadRequestId;
      currentLanguage = language;
      applyLanguageCopy(language);
      closeToc();
      article.classList.add("loading");
      article.textContent = BOOKS[language].copy.loading;

      const renderEmbedded = () => {
        if (language !== "ko") return false;
        const embedded = getEmbeddedBook();
        if (!embedded) return false;
        renderBook(embedded);
        return true;
      };

      if (window.location.protocol === "file:" && renderEmbedded()) {
        return;
      }

      const file = BOOKS[language].file;

      try {
        const response = await fetch(encodeURI(file));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const markdown = await response.text();
        if (requestId !== loadRequestId) return;
        renderBook(markdownToHtml(markdown));
      } catch (error) {
        if (requestId !== loadRequestId) return;
        if (renderEmbedded()) {
          console.warn("Markdown fetch failed; rendered the embedded book instead.", error);
          return;
        }
        renderError(file, error);
      }
    }

    function initApp() {
      initTheme();
      initTextSize();
      initMobileToc();
      initProgress();
      initLanguage();

      backToTop.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      loadBook(currentLanguage);
    }

    initApp();
  </script>
